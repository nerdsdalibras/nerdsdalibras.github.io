<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Descubra seu nível em Libras — Nerds da Libras</title>
  <meta name="description" content="Avaliação gratuita em 7 perguntas. Descubra seu nível em Libras e qual o próximo passo certo para você."/>
  <meta property="og:title" content="Diagnóstico de Libras — Profa. Lorena"/>
  <meta property="og:image" content="https://nerdsdalibras.github.io/fotos/IMG_4952.jpg"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    :root {
      --bg:       #0D1117;
      --bg2:      #161B22;
      --bg3:      #1C2333;
      --border:   rgba(255,255,255,.08);
      --blue:     #1A73E8;
      --blue-lt:  #4D9EFF;
      --gold:     #C9982A;
      --gold-lt:  #F0BC44;
      --text:     #E6EDF3;
      --muted:    #8B949E;
      --bubble-bot: #1C2333;
      --bubble-user: #1A3A5C;
    }

    body {
      background: var(--bg);
      font-family: 'Inter', sans-serif;
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── TOPBAR ── */
    .topbar {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 20px;
      position: sticky; top: 0; z-index: 100;
    }
    .topbar-brand { display: flex; align-items: center; gap: 10px; }
    .topbar-logo {
      width: 32px; height: 32px; border-radius: 50%;
      overflow: hidden; border: 1.5px solid rgba(255,255,255,.15);
    }
    .topbar-logo img { width: 100%; height: 100%; object-fit: cover; object-position: top; }
    .topbar-name { font-weight: 700; font-size: .88rem; color: var(--text); }
    .topbar-sub  { font-size: .7rem; color: var(--muted); }
    .topbar-back { font-size: .78rem; color: var(--muted); text-decoration: none; transition: color .2s; }
    .topbar-back:hover { color: var(--text); }

    /* ── LAYOUT ── */
    .page { display: flex; flex-direction: column; height: calc(100vh - 53px); }

    /* ── CHAT AREA ── */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px 12px;
      display: flex; flex-direction: column;
      gap: 0;
      scroll-behavior: smooth;
    }
    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-track { background: transparent; }
    .chat-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 4px; }

    /* ── MENSAGEM ── */
    .msg-row {
      display: flex; align-items: flex-end; gap: 10px;
      max-width: 520px; width: 100%; margin: 0 auto;
      margin-bottom: 6px;
      opacity: 0; transform: translateY(10px);
      animation: msgIn .35s ease forwards;
    }
    @keyframes msgIn { to { opacity: 1; transform: translateY(0); } }

    .msg-row.bot  { justify-content: flex-start; }
    .msg-row.user { justify-content: flex-end; }

    .msg-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      overflow: hidden; flex-shrink: 0;
      border: 1.5px solid rgba(255,255,255,.12);
    }
    .msg-avatar img { width: 100%; height: 100%; object-fit: cover; object-position: top; }
    .msg-avatar-spacer { width: 36px; flex-shrink: 0; }

    .msg-bubble {
      padding: 11px 15px;
      border-radius: 18px;
      font-size: .88rem; line-height: 1.6;
      max-width: calc(100% - 50px);
    }
    .bot  .msg-bubble {
      background: var(--bubble-bot);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      color: var(--text);
    }
    .user .msg-bubble {
      background: var(--bubble-user);
      border: 1px solid rgba(26,115,232,.25);
      border-bottom-right-radius: 4px;
      color: #fff;
    }
    .msg-bubble strong { color: var(--gold-lt); }

    /* ── DIGITANDO ── */
    .typing-row {
      display: flex; align-items: flex-end; gap: 10px;
      max-width: 520px; width: 100%; margin: 0 auto 8px;
    }
    .typing-bubble {
      background: var(--bubble-bot);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      border-radius: 18px;
      padding: 12px 16px;
      display: flex; gap: 5px; align-items: center;
    }
    .typing-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--muted);
      animation: typeDot 1.3s ease-in-out infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: .2s; }
    .typing-dot:nth-child(3) { animation-delay: .4s; }
    @keyframes typeDot { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

    /* ── INPUT AREA ── */
    .input-area {
      border-top: 1px solid var(--border);
      background: var(--bg2);
      padding: 14px 16px;
    }
    .input-inner {
      max-width: 520px; margin: 0 auto;
      display: flex; flex-direction: column; gap: 10px;
    }

    /* ── CAMPO DE TEXTO ── */
    .field-wrap { display: flex; gap: 10px; }
    .field-input {
      flex: 1;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'Inter', sans-serif; font-size: .9rem;
      padding: 12px 14px;
      outline: none; transition: border-color .2s;
    }
    .field-input:focus { border-color: rgba(26,115,232,.5); }
    .field-input::placeholder { color: var(--muted); }
    .field-input.error { border-color: rgba(220,50,50,.5); }

    .btn-send {
      background: var(--blue);
      border: none; border-radius: 12px;
      color: #fff; font-family: 'Inter', sans-serif;
      font-weight: 700; font-size: .88rem;
      padding: 12px 20px; cursor: pointer;
      transition: background .2s, transform .15s;
      white-space: nowrap;
    }
    .btn-send:hover { background: var(--blue-lt); transform: translateY(-1px); }
    .btn-send:disabled { opacity: .35; cursor: not-allowed; transform: none; }

    /* ── OPÇÕES DE RESPOSTA ── */
    .options-wrap {
      display: flex; flex-direction: column; gap: 8px;
    }
    .opt-btn {
      display: flex; align-items: center; gap: 12px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      cursor: pointer; text-align: left;
      color: var(--text); font-family: 'Inter', sans-serif;
      font-size: .85rem; line-height: 1.45;
      transition: all .15s;
      width: 100%;
    }
    .opt-btn:hover {
      background: rgba(26,115,232,.12);
      border-color: rgba(26,115,232,.35);
      color: #fff;
      transform: translateX(2px);
    }
    .opt-btn.selected {
      background: rgba(26,115,232,.18);
      border-color: rgba(26,115,232,.6);
      color: #fff;
    }
    .opt-letter {
      width: 28px; height: 28px; flex-shrink: 0;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,.15);
      display: flex; align-items: center; justify-content: center;
      font-size: .72rem; font-weight: 700; color: var(--muted);
      transition: all .15s;
    }
    .opt-btn.selected .opt-letter {
      background: var(--blue); border-color: var(--blue); color: #fff;
    }

    /* ── BARRA DE PROGRESSO ── */
    .progress-wrap {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 12px; padding: 12px 14px;
    }
    .progress-label {
      display: flex; justify-content: space-between; align-items: center;
      font-size: .75rem; color: var(--muted); margin-bottom: 8px;
    }
    .progress-label strong { color: var(--gold-lt); }
    .progress-track {
      height: 3px; background: rgba(255,255,255,.08); border-radius: 999px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; border-radius: 999px;
      background: linear-gradient(90deg, var(--blue), var(--blue-lt));
      transition: width .5s ease;
    }

    /* ── BOTÃO CONFIRMAR ── */
    .btn-confirm {
      background: var(--blue); border: none; border-radius: 12px;
      color: #fff; font-family: 'Inter', sans-serif;
      font-weight: 700; font-size: .9rem;
      padding: 13px 20px; cursor: pointer;
      transition: background .2s, transform .15s;
      width: 100%;
    }
    .btn-confirm:hover { background: var(--blue-lt); transform: translateY(-1px); }
    .btn-confirm:disabled { opacity: .3; cursor: not-allowed; transform: none; }

    /* ── RESULTADO ── */
    .result-card {
      background: var(--bg2);
      border: 1px solid rgba(201,152,42,.25);
      border-radius: 16px; padding: 22px 18px;
      max-width: 520px; margin: 0 auto 8px;
      width: 100%;
      animation: msgIn .4s ease forwards;
    }
    .result-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(201,152,42,.12); border: 1px solid rgba(201,152,42,.3);
      color: var(--gold-lt); border-radius: 999px;
      padding: 4px 14px; font-size: .7rem; font-weight: 800;
      letter-spacing: .08em; text-transform: uppercase; margin-bottom: 14px;
    }
    .result-title {
      font-size: 1.3rem; font-weight: 800; color: #fff;
      line-height: 1.3; margin-bottom: 14px;
    }
    .result-diag {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 16px;
      font-size: .86rem; color: #ccc; line-height: 1.7;
      margin-bottom: 18px;
    }
    .result-diag strong { color: #fff; }

    /* ── CARD PRODUTO ── */
    .produto-card {
      background: var(--bg3);
      border: 1px solid rgba(26,115,232,.25);
      border-radius: 14px; padding: 18px 16px;
      margin-bottom: 14px;
    }
    .produto-tag {
      font-size: .68rem; font-weight: 800; text-transform: uppercase;
      letter-spacing: .1em; color: var(--blue-lt); margin-bottom: 8px;
    }
    .produto-nome {
      font-weight: 800; font-size: 1rem; color: #fff; margin-bottom: 6px;
    }
    .produto-desc {
      font-size: .82rem; color: var(--muted); line-height: 1.55; margin-bottom: 16px;
    }
    .btn-cta {
      display: block; width: 100%;
      background: linear-gradient(135deg, var(--blue), var(--blue-lt));
      color: #fff; text-decoration: none;
      border-radius: 12px; padding: 14px 18px;
      font-weight: 800; font-size: .92rem;
      text-align: center;
      transition: opacity .2s, transform .15s;
      border: none; cursor: pointer; font-family: 'Inter', sans-serif;
    }
    .btn-cta:hover { opacity: .88; transform: translateY(-1px); }

    .btn-restart {
      display: block; width: 100%; max-width: 520px; margin: 4px auto 0;
      background: transparent; border: 1px solid var(--border);
      color: var(--muted); border-radius: 10px;
      padding: 10px 18px; font-size: .8rem; font-weight: 600;
      cursor: pointer; font-family: 'Inter', sans-serif;
      transition: all .2s; text-align: center;
    }
    .btn-restart:hover { border-color: rgba(255,255,255,.25); color: var(--text); }

    /* ── SCORE PILL ── */
    .score-pill {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,.06); border: 1px solid var(--border);
      border-radius: 999px; padding: 3px 12px;
      font-size: .7rem; color: var(--muted); margin-top: 6px;
    }

    /* ── UTIL ── */
    .hidden { display: none !important; }
    .dot-online {
      width: 7px; height: 7px; border-radius: 50%; background: #22C55E;
      display: inline-block;
      box-shadow: 0 0 6px rgba(34,197,94,.5);
      animation: pulse 1.5s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.6;transform:scale(1.5)} }

    .topbar-status {
      display: flex; align-items: center; gap: 5px;
      font-size: .7rem; color: #4ADE80;
    }

    @media (max-width: 480px) {
      .chat-area { padding: 16px 10px 8px; }
      .input-area { padding: 10px 10px; }
      .msg-bubble { font-size: .84rem; }
    }
  </style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-brand">
    <div class="topbar-logo">
      <img src="fotos/IMG_4952.jpg" alt="Lorena" onerror="this.src='fotos/IMG_4977.jpg'"/>
    </div>
    <div>
      <div class="topbar-name">Prof. Lorena</div>
      <div class="topbar-sub">Nerds da Libras · Diagnóstico Gratuito</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:14px;">
    <div class="topbar-status"><div class="dot-online"></div> Online</div>
    <a class="topbar-back" href="https://nerdsdalibras.github.io">← Site</a>

</div>

<div class="page">

  <!-- CHAT -->
  <div class="chat-area" id="chat-area"></div>

  <!-- INPUT / OPÇÕES -->
  <div class="input-area" id="input-area">
    <div class="input-inner" id="input-inner">
      <!-- preenchido dinamicamente -->
    </div>
  </div>

</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbyBnO0BBl1FCAU6lVeOVRu_4u_5DN0cOWp3ErskE_dLRZ-54x_51yK82icCn8tfx71F/exec';
const LINK_CURSO    = 'https://pay.kiwify.com.br/1sIyvVL';
const LINK_MENTORIA = 'https://chk.eduzz.com/pykhq6gg';

// ─── PERGUNTAS ────────────────────────────────────────────
const QUESTIONS = [
  {
    text: 'Quando você tenta conversar em Libras, qual situação mais parece com você?',
    opts: [
      { l:'A', t:'Não sei praticamente nada.', p:1 },
      { l:'B', t:'Sei alguns sinais e o alfabeto.', p:2 },
      { l:'C', t:'Consigo formar frases simples.', p:3 },
      { l:'D', t:'Consigo conversar, mas ainda não com total naturalidade.', p:4 },
    ]
  },
  {

    opts: [
      { l:'A', t:'Não consigo entender.', p:1 },
      { l:'B', t:'Entendo alguns sinais isolados.', p:2 },
      { l:'C', t:'Entendo partes da conversa.', p:3 },
      { l:'D', t:'Entendo bem, mas ainda perco alguns detalhes.', p:4 },
    ]
  },
  {
    text: 'Quando preciso me apresentar em Libras:',
    opts: [
      { l:'A', t:'Não consigo.', p:1 },
      { l:'B', t:'Consigo com muita dificuldade.', p:2 },
      { l:'C', t:'Consigo falar informações básicas.', p:3 },
      { l:'D', t:'Consigo me expressar com tranquilidade.', p:4 },
    ]
  },
  {
    text: 'Quando não conheço um sinal:',
    opts: [
      { l:'A', t:'A conversa para.', p:1 },
      { l:'B', t:'Tento soletrar.', p:2 },
      { l:'C', t:'Tento explicar de outra forma.', p:3 },
      { l:'D', t:'Consigo contornar a situação naturalmente.', p:4 },
    ]
  },
  {
    text: 'Quando assisto a um vídeo em Libras sem legenda:',
    opts: [
      { l:'A', t:'Não entendo nada.', p:1 },
      { l:'B', t:'Reconheço poucos sinais.', p:2 },
      { l:'C', t:'Entendo parte da mensagem.', p:3 },
      { l:'D', t:'Entendo quase tudo.', p:4 },
    ]
  },
  {
    text: 'Qual frase mais representa você hoje?',
    opts: [
      { l:'A', t:'Quero começar do zero.', p:1 },
      { l:'B', t:'Quero construir uma base sólida.', p:2 },
      { l:'C', t:'Quero me comunicar melhor.', p:3 },
      { l:'D', t:'Quero alcançar fluência.', p:4 },
    ]
  },
  {
    text: 'Qual é seu maior objetivo com Libras?',
    opts: [
      { l:'A', t:'Aprender o básico para começar.', p:1 },
      { l:'B', t:'Conseguir conversar em situações simples.', p:2 },
      { l:'C', t:'Me comunicar com mais segurança.', p:3 },
      { l:'D', t:'Ser fluente e/ou atuar profissionalmente.', p:4 },
    ]
  },
];

// ─── RESULTADOS ───────────────────────────────────────────
function getResult(nome, score) {
  if (score <= 14) {
    return {
      badge: '🌱 Base em Construção',
      title: `${nome}, você está no momento de construir uma base sólida em Libras.`,
      diag: `Isso significa que seu foco agora deve ser aprender os sinais essenciais, entender como formar frases simples e começar a se comunicar com mais segurança.\n\nO próximo passo mais indicado para você é o <strong>Do Zero à Libras</strong>.`,
      produto: {
        tag: '⭐ Indicado para você',
        nome: 'Do Zero à Libras',
        desc: 'Método exclusivo da Profa. Lorena. Do absoluto zero à comunicação real com surdos — aprenda como a mente surda pensa, não como tradução do português.',
        cta: 'Quero começar do jeito certo →',
        link: LINK_CURSO,
      }
    };
  } else if (score <= 21) {
    return {
      badge: '🚀 Comunicação em Desenvolvimento',
      title: `${nome}, você já tem contato com a Libras.`,
      diag: `Provavelmente você conhece alguns sinais importantes. Mas talvez ainda sinta que falta organização para formar frases, entender melhor o que o surdo sinaliza e se comunicar com mais segurança.\n\nO próximo passo mais indicado para você é o <strong>Do Zero à Libras</strong>.`,
      produto: {
        tag: '✅ Ideal para sua fase',
        nome: 'Do Zero à Libras',
        desc: 'Organize tudo que você já sabe e dê o próximo passo com método, estrutura e prática real.',
        cta: 'Quero organizar minha Libras →',
        link: LINK_CURSO,
      }
    };
  } else {
    return {
      badge: '💎 Rumo à Fluência',
      title: `${nome}, você já tem uma boa base em Libras.`,
      diag: `Agora, seu próximo desafio não é apenas aprender mais sinais, mas desenvolver naturalidade, compreensão, estrutura e fluência para se comunicar em situações reais.\n\nO próximo passo mais indicado para você é a <strong>Mentoria Destrava Libras</strong>.`,
      produto: {
        tag: '💜 Próximo passo para você',
        nome: 'Mentoria Destrava Libras',
        desc: 'Acompanhamento direto e personalizado com a Profa. Lorena. Ela analisa sua sinalização e te direciona para sinalizar com clareza, naturalidade e segurança.',
        cta: 'Quero acelerar minha fluência →',
        link: LINK_MENTORIA,
      }
    };
  }
}

// ─── ESTADO ───────────────────────────────────────────────
let state = {
  fase: 'intro',   // intro | nome | email | quiz | resultado
  nome: '',
  email: '',
  qIdx: 0,
  score: 0,
  respostas: [],
  selectedOpt: null,
};

const $chat   = document.getElementById('chat-area');
const $inner  = document.getElementById('input-inner');

// ─── HELPERS ──────────────────────────────────────────────
function scrollBottom() {
  setTimeout(() => { $chat.scrollTop = $chat.scrollHeight; }, 60);
}

function addMsg(text, type = 'bot', delay = 0) {
  return new Promise(resolve => {
    setTimeout(() => {
      const row = document.createElement('div');
      row.className = `msg-row ${type}`;

      if (type === 'bot') {
        row.innerHTML = `
          <div class="msg-avatar">
            <img src="fotos/IMG_4952.jpg" alt="Lorena" onerror="this.src='fotos/IMG_4977.jpg'"/>
          </div>
          <div class="msg-bubble">${text}</div>`;
      } else {
        row.innerHTML = `
          <div class="msg-avatar-spacer"></div>
          <div class="msg-bubble">${text}</div>`;
      }

      $chat.appendChild(row);
      scrollBottom();
      resolve();
    }, delay);
  });
}

function showTyping() {
  const row = document.createElement('div');
  row.className = 'typing-row';
  row.id = 'typing-indicator';
  row.innerHTML = `
    <div class="msg-avatar">
      <img src="fotos/IMG_4952.jpg" alt="Lorena" onerror="this.src='fotos/IMG_4977.jpg'"/>
    </div>
    <div class="typing-bubble">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>`;
  $chat.appendChild(row);
  scrollBottom();
}

function hideTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

function botSay(messages) {
  // messages: array de { text, delay }
  return messages.reduce((p, m, i) => {
    return p.then(() => {
      return new Promise(resolve => {
        showTyping();
        const typingDuration = Math.min(800 + m.text.length * 18, 1800);
        setTimeout(() => {
          hideTyping();
          addMsg(m.text, 'bot').then(resolve);
        }, typingDuration);
      });
    });
  }, Promise.resolve());
}

function clearInput() {
  $inner.innerHTML = '';
}

function setInput(html) {
  $inner.innerHTML = html;
}

// ─── FLUXO ────────────────────────────────────────────────

// 1. INTRO
async function startIntro() {
  state.fase = 'intro';
  clearInput();

  await botSay([
    { text: 'Oi! Eu sou a Lorena, da Nerds da Libras 💙' },
    { text: 'Preparei uma avaliação rápida para te ajudar a descobrir seu nível atual em Libras.' },
    { text: 'São só 7 perguntas. No final, eu vou te mostrar qual é o seu momento atual e qual o próximo passo mais indicado para você.' },
    { text: 'Antes de começar, como posso te chamar?' },
  ]);

  showNameInput();
}

// 2. INPUT NOME
function showNameInput() {
  state.fase = 'nome';
  setInput(`
    <div class="field-wrap">
      <input class="field-input" id="inp-nome" type="text" placeholder="Digite seu nome" maxlength="40" autocomplete="given-name"
        onkeydown="if(event.key==='Enter')submitNome()"/>
      <button class="btn-send" onclick="submitNome()">Enviar</button>
    </div>
  `);
  document.getElementById('inp-nome').focus();
}

async function submitNome() {
  const inp = document.getElementById('inp-nome');
  if (!inp) return;
  const nome = inp.value.trim();
  if (!nome) {
    inp.classList.add('error');
    inp.placeholder = 'Por favor, digita seu nome 😊';
    inp.focus(); return;
  }
  state.nome = nome;
  clearInput();
  await addMsg(nome, 'user');

  await botSay([
    { text: `Prazer, <strong>${nome}</strong>! Agora me passa seu melhor e-mail para eu salvar seu diagnóstico.` },
  ]);
  showEmailInput();
}

// 3. INPUT EMAIL
function showEmailInput() {
  state.fase = 'email';
  setInput(`
    <div class="field-wrap">
      <input class="field-input" id="inp-email" type="email" placeholder="Digite seu melhor e-mail" maxlength="80" autocomplete="email"
        onkeydown="if(event.key==='Enter')submitEmail()"/>
      <button class="btn-send" onclick="submitEmail()">Enviar</button>
    </div>
  `);
  document.getElementById('inp-email').focus();
}

function validEmail(e) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e);
}

async function submitEmail() {
  const inp = document.getElementById('inp-email');
  if (!inp) return;
  const email = inp.value.trim();
  if (!validEmail(email)) {
    inp.classList.add('error');
    inp.value = '';
    inp.placeholder = 'E-mail inválido. Tenta de novo 😊';
    inp.focus(); return;
  }
  state.email = email;
  clearInput();
  await addMsg(email, 'user');

  // Salva lead inicial no CRM
  sendCRM({ fase: 'lead_capturado' });

  await botSay([
    { text: `Perfeito, <strong>${state.nome}</strong>! Agora vamos começar sua avaliação. Responda com sinceridade, combinado? 🎯` },
  ]);

  state.qIdx = 0;
  state.score = 0;
  state.respostas = [];
  showQuestion();
}

// 4. QUIZ
function showQuestion() {
  state.fase = 'quiz';
  state.selectedOpt = null;
  const q = QUESTIONS[state.qIdx];
  const n = state.qIdx + 1;
  const pct = Math.round((n / QUESTIONS.length) * 100);

  const optsHtml = q.opts.map((op, i) => `
    <button class="opt-btn" id="opt-${i}" onclick="selectOpt(${i})">
      <span class="opt-letter">${op.l}</span>
      <span>${op.t}</span>
    </button>`).join('');

  setInput(`
    <div class="progress-wrap">
      <div class="progress-label">
        <span>Pergunta <strong>${n}</strong> de ${QUESTIONS.length}</span>
        <span>${pct}%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" style="width:${pct}%"></div>
      </div>
    </div>
    <div class="options-wrap">${optsHtml}</div>
    <button class="btn-confirm" id="btn-confirm" onclick="confirmOpt()" disabled>
      Confirmar resposta →
    </button>
  `);
}

function selectOpt(idx) {
  state.selectedOpt = idx;
  document.querySelectorAll('.opt-btn').forEach((b, i) =>
    b.classList.toggle('selected', i === idx)
  );
  const btn = document.getElementById('btn-confirm');
  if (btn) btn.disabled = false;
}

async function confirmOpt() {
  if (state.selectedOpt === null) return;
  const q   = QUESTIONS[state.qIdx];
  const opt = q.opts[state.selectedOpt];

  state.score += opt.p;
  state.respostas.push({ pergunta: q.text, resposta: opt.t, pontos: opt.p });

  clearInput();
  await addMsg(opt.t, 'user');

  if (state.qIdx < QUESTIONS.length - 1) {
    state.qIdx++;
    // breve pausa antes da próxima
    await new Promise(r => setTimeout(r, 300));
    showQuestion();
  } else {
    await showResult();
  }
}

// 5. RESULTADO
async function showResult() {
  state.fase = 'resultado';
  clearInput();

  await botSay([
    { text: 'Ótimo! Analisei suas respostas...' },
    { text: `<strong>${state.nome}</strong>, aqui está seu diagnóstico 👇` },
  ]);

  const r = getResult(state.nome, state.score);

  // Card de resultado
  const card = document.createElement('div');
  card.className = 'result-card';
  card.innerHTML = `
    <div class="result-badge">${r.badge}</div>
    <div class="result-title">${r.title}</div>
    <div class="result-diag">${r.diag.replace(/\n/g,'<br/>')}</div>
    <div class="score-pill">Pontuação: ${state.score} de ${QUESTIONS.length * 4}</div>
  `;
  $chat.appendChild(card);
  scrollBottom();

  // Mensagem final da Lorena
  await botSay([
    { text: 'Esse diagnóstico mostra seu ponto de partida. Agora o mais importante é escolher o próximo passo certo para evoluir com mais clareza e segurança.' },
  ]);

  // Card produto
  const p = r.produto;
  const prod = document.createElement('div');
  prod.style.maxWidth = '520px';
  prod.style.width = '100%';
  prod.style.margin = '0 auto 8px';
  prod.style.animation = 'msgIn .4s ease forwards';
  prod.style.opacity = '0';
  prod.innerHTML = `
    <div class="produto-card">
      <div class="produto-tag">${p.tag}</div>
      <div class="produto-nome">${p.nome}</div>
      <div class="produto-desc">${p.desc}</div>
      <a class="btn-cta" href="${p.link}" target="_blank" rel="noopener">${p.cta}</a>
    </div>
  `;
  $chat.appendChild(prod);

  const restart = document.createElement('button');
  restart.className = 'btn-restart';
  restart.textContent = '↩ Refazer o diagnóstico';
  restart.onclick = restartQuiz;
  $chat.appendChild(restart);

  scrollBottom();

  // Salva dados completos no CRM
  sendCRM({
    fase: 'diagnostico_completo',
    diagnostico: r.badge,
    produto_recomendado: p.nome,
  });
}

// ─── CRM ─────────────────────────────────────────────────
function sendCRM(extra) {
  try {
    const payload = {
      sessionId:  Date.now() + '_' + Math.random().toString(36).slice(2,8),
      nome:       state.nome,
      email:      state.email,
      score:      state.score,
      respostas:  JSON.stringify(state.respostas),
      fonte:      'quiz-libras',
      createdAt:  new Date().toISOString(),
      ...extra,
    };
    fetch(SHEETS_URL, {
      method: 'POST', mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(payload),
    }).catch(() => {});
  } catch(e) {}
}

// ─── RESTART ─────────────────────────────────────────────
function restartQuiz() {
  state = { fase:'intro', nome:'', email:'', qIdx:0, score:0, respostas:[], selectedOpt:null };
  $chat.innerHTML = '';
  clearInput();
  startIntro();
}

// ─── INIT ─────────────────────────────────────────────────
startIntro();
</script>
</body>
</html>
