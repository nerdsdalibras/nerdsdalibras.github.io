<html lang="pt-BR">

  <meta property="og:image" content="https://nerdsdalibras.github.io/fotos/IMG_4952.jpg"/>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0D1117;
      --surface:     #161B22;
      --surface-2:   #1C2333;
      --border:      rgba(255,255,255,.08);
      --border-soft: rgba(255,255,255,.05);
      --blue:        #1A73E8;
      --blue-lt:     #4D9EFF;
      --blue-dim:    rgba(26,115,232,.14);
      --gold:        #C9982A;
      --gold-lt:     #F0BC44;
      --text:        #E6EDF3;
      --muted:       #8B949E;
      --success:     #22C55E;
      --error:       #F87171;
      --bubble-user: #1A3A5C;
      --radius:      14px;
    }

    html { height: 100%; }

    body {
      background: var(--bg);
      font-family: 'Inter', system-ui, sans-serif;
      color: var(--text);
      height: 100dvh;
      display: flex; flex-direction: column;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    /* ═══════════ TOPBAR ═══════════ */
    .topbar {
      background: rgba(22,27,34,.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px;
      padding: 10px max(16px, env(safe-area-inset-left));
      flex-shrink: 0;
      z-index: 100;
    }
    .topbar-brand { display: flex; align-items: center; gap: 11px; min-width: 0; }
    .topbar-logo {
      width: 38px; height: 38px; border-radius: 50%;
      overflow: hidden; flex-shrink: 0;
      border: 2px solid rgba(77,158,255,.35);
    }
    .topbar-logo img { width: 100%; height: 100%; object-fit: cover; object-position: top; }
    .topbar-name { font-weight: 700; font-size: .9rem; line-height: 1.2; }
    .topbar-status {
      display: flex; align-items: center; gap: 5px;
      font-size: .72rem; color: var(--success); margin-top: 2px;
    }
    .dot-online {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 6px rgba(34,197,94,.5);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.45} }
    .topbar-back {
      font-size: .78rem; font-weight: 600; color: var(--muted);
      text-decoration: none; white-space: nowrap;
      padding: 7px 12px; border-radius: 8px;
      border: 1px solid var(--border);
      transition: color .2s, border-color .2s;
    }
    .topbar-back:hover { color: var(--text); border-color: rgba(255,255,255,.2); }

    /* ═══════════ CHAT ═══════════ */
    .chat-area {
      flex: 1; overflow-y: auto;
      padding: 24px 16px 16px;
      scroll-behavior: smooth;
    }
    .chat-area::-webkit-scrollbar { width: 5px; }
    .chat-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,.12); border-radius: 5px; }

    .chat-inner {
      max-width: 540px; margin: 0 auto;
      display: flex; flex-direction: column; gap: 8px;
    }

    .msg-row {
      display: flex; align-items: flex-end; gap: 10px;
      opacity: 0; transform: translateY(12px);
      animation: msgIn .35s cubic-bezier(.21,1.02,.55,1) forwards;
    }
    @keyframes msgIn { to { opacity: 1; transform: translateY(0); } }
    @media (prefers-reduced-motion: reduce) {
      .msg-row, .result-card, .produto-wrap { animation-duration: .01s !important; }
    }

    .msg-row.bot  { justify-content: flex-start; }
    .msg-row.user { justify-content: flex-end; }

    .msg-avatar {
      width: 34px; height: 34px; border-radius: 50%;
      overflow: hidden; flex-shrink: 0;
      border: 1.5px solid rgba(255,255,255,.12);
    }
    .msg-avatar img { width: 100%; height: 100%; object-fit: cover; object-position: top; }
    /* avatar só na última bolha de uma sequência */
    .msg-avatar.ghost { visibility: hidden; }

    .msg-bubble {
      padding: 11px 15px;
      border-radius: 16px;
      font-size: .89rem; line-height: 1.6;
      max-width: min(82%, 420px);
      word-wrap: break-word;
    }
    .bot .msg-bubble {
      background: var(--surface-2);
      border: 1px solid var(--border-soft);
      border-bottom-left-radius: 4px;
    }
    .user .msg-bubble {
      background: var(--bubble-user);
      border: 1px solid rgba(26,115,232,.22);
      border-bottom-right-radius: 4px;
      color: #fff;
    }
    .msg-bubble strong { color: var(--gold-lt); font-weight: 700; }

    /* ── digitando ── */
    .typing-row { display: flex; align-items: flex-end; gap: 10px; }
    .typing-bubble {
      background: var(--surface-2);
      border: 1px solid var(--border-soft);
      border-radius: 16px; border-bottom-left-radius: 4px;
      padding: 13px 17px;
      display: flex; gap: 5px; align-items: center;
    }
    .typing-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--muted);
      animation: typeDot 1.3s ease-in-out infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: .18s; }
    .typing-dot:nth-child(3) { animation-delay: .36s; }
    @keyframes typeDot { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

    /* ═══════════ INPUT AREA ═══════════ */
    .input-area {
      flex-shrink: 0;
      border-top: 1px solid var(--border);
      background: var(--surface);
      padding: 14px 16px calc(14px + env(safe-area-inset-bottom));
    }
    .input-inner {
      max-width: 540px; margin: 0 auto;
      display: flex; flex-direction: column; gap: 10px;
    }
    .input-inner:empty { display: none; }
    .input-area:has(.input-inner:empty) { padding: 0; border-top: none; }

    .field-wrap { display: flex; gap: 10px; }
    .field-input {
      flex: 1; min-width: 0;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font: inherit; font-size: .92rem;
      padding: 13px 15px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .field-input:focus { border-color: rgba(26,115,232,.55); box-shadow: 0 0 0 3px rgba(26,115,232,.12); }
    .field-input::placeholder { color: var(--muted); }
    .field-input.error { border-color: rgba(248,113,113,.55); }
    .field-error {
      font-size: .76rem; color: var(--error);
      padding-left: 4px; margin-top: -4px;
      display: none;
    }
    .field-error.show { display: block; }

    .btn-send {
      background: var(--blue);
      border: none; border-radius: 12px;
      color: #fff; font: inherit; font-weight: 700; font-size: .88rem;
      padding: 13px 22px; cursor: pointer;
      transition: background .2s, transform .15s, opacity .2s;
      white-space: nowrap;
    }
    .btn-send:hover:not(:disabled) { background: var(--blue-lt); transform: translateY(-1px); }
    .btn-send:disabled { opacity: .4; cursor: not-allowed; }

    /* ── progresso ── */
    .progress-wrap {
      background: var(--surface-2);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius);
      padding: 12px 15px;
    }
    .progress-label {
      display: flex; justify-content: space-between; align-items: center;
      font-size: .76rem; color: var(--muted); margin-bottom: 9px;
      font-weight: 500;
    }
    .progress-label strong { color: var(--gold-lt); font-weight: 800; }
    .progress-track {
      height: 4px; background: rgba(255,255,255,.07);
      border-radius: 999px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; border-radius: 999px;
      background: linear-gradient(90deg, var(--blue), var(--blue-lt));
      transition: width .5s ease;
    }

    /* ── opções ── */
    .options-wrap { display: flex; flex-direction: column; gap: 8px; }
    .opt-btn {
      display: flex; align-items: center; gap: 12px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 13px 15px;
      cursor: pointer; text-align: left;
      color: var(--text); font: inherit;
      font-size: .86rem; line-height: 1.45;
      transition: background .15s, border-color .15s, transform .15s;
      width: 100%;
    }
    .opt-btn:hover {
      background: var(--blue-dim);
      border-color: rgba(26,115,232,.35);
      transform: translateX(3px);
    }
    .opt-btn.selected {
      background: rgba(26,115,232,.2);
      border-color: rgba(26,115,232,.65);
      color: #fff;
    }
    .opt-btn:focus-visible { outline: 2px solid var(--blue-lt); outline-offset: 2px; }
    .opt-letter {
      width: 28px; height: 28px; flex-shrink: 0;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,.16);
      display: flex; align-items: center; justify-content: center;
      font-size: .72rem; font-weight: 800; color: var(--muted);
      transition: all .15s;
    }
    .opt-btn.selected .opt-letter {
      background: var(--blue); border-color: var(--blue); color: #fff;
    }

    .btn-confirm {
      background: var(--blue);
      border: none; border-radius: 12px;
      color: #fff; font: inherit; font-weight: 800; font-size: .92rem;
      padding: 14px 22px; cursor: pointer; width: 100%;
      transition: background .2s, transform .15s, opacity .2s;
    }
    .btn-confirm:hover:not(:disabled) { background: var(--blue-lt); transform: translateY(-1px); }
    .btn-confirm:disabled { opacity: .3; cursor: not-allowed; }

    /* ═══════════ RESULTADO ═══════════ */
    .result-card {
      background: linear-gradient(165deg, var(--surface) 0%, var(--surface-2) 100%);
      border: 1px solid rgba(201,152,42,.3);
      border-radius: 18px;
      padding: 26px 22px;
      opacity: 0; transform: translateY(12px);
      animation: msgIn .45s cubic-bezier(.21,1.02,.55,1) forwards;
      box-shadow: 0 12px 48px rgba(0,0,0,.35);
    }
    .result-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(201,152,42,.12);
      border: 1px solid rgba(201,152,42,.35);
      color: var(--gold-lt);
      border-radius: 999px;
      padding: 5px 16px;
      font-size: .7rem; font-weight: 800;
      letter-spacing: .08em; text-transform: uppercase;
      margin-bottom: 16px;
    }
    .result-title {
      font-size: 1.32rem; font-weight: 800; color: #fff;
      line-height: 1.35; margin-bottom: 16px;
      letter-spacing: -.01em;
    }
    .result-diag {
      background: rgba(0,0,0,.25);
      border: 1px solid var(--border-soft);
      border-radius: 12px;
      padding: 16px 18px;
      font-size: .87rem; color: #C9D1D9; line-height: 1.75;
      margin-bottom: 14px;
    }
    .result-diag strong { color: var(--gold-lt); }
    .score-pill {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,.05);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 4px 14px;
      font-size: .72rem; font-weight: 600; color: var(--muted);
    }

    /* ── produto ── */
    .produto-wrap {
      opacity: 0; transform: translateY(12px);
      animation: msgIn .45s cubic-bezier(.21,1.02,.55,1) forwards;
    }
    .produto-card {
      background: var(--surface-2);
      border: 1px solid rgba(26,115,232,.3);
      border-radius: 16px;
      padding: 20px 18px;
      box-shadow: 0 8px 36px rgba(0,0,0,.3);
    }
    .produto-tag {
      font-size: .68rem; font-weight: 800;
      text-transform: uppercase; letter-spacing: .1em;
      color: var(--blue-lt); margin-bottom: 9px;
    }
    .produto-nome {
      font-weight: 800; font-size: 1.08rem; color: #fff;
      margin-bottom: 7px; letter-spacing: -.01em;
    }
    .produto-desc {
      font-size: .84rem; color: var(--muted);
      line-height: 1.6; margin-bottom: 18px;
    }
    .btn-cta {
      display: block; width: 100%;
      background: linear-gradient(135deg, var(--blue) 0%, var(--blue-lt) 100%);
      color: #fff; text-decoration: none; text-align: center;
      border-radius: 12px;
      padding: 15px 20px;
      font-weight: 800; font-size: .95rem;
      transition: opacity .2s, transform .15s, box-shadow .2s;
      box-shadow: 0 4px 20px rgba(26,115,232,.35);
    }
    .btn-cta:hover {
      opacity: .92; transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(26,115,232,.45);
    }

    .btn-restart {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted); border-radius: 10px;
      padding: 11px 18px;
      font: inherit; font-size: .8rem; font-weight: 600;
      cursor: pointer; width: 100%;
      transition: color .2s, border-color .2s;
      text-align: center;
    }
    .btn-restart:hover { border-color: rgba(255,255,255,.25); color: var(--text); }

    @media (max-width: 480px) {
      .chat-area { padding: 18px 12px 12px; }
      .input-area { padding: 12px 12px calc(12px + env(safe-area-inset-bottom)); }
      .msg-bubble { font-size: .86rem; max-width: 88%; }
      .result-card { padding: 22px 18px; }
      .result-title { font-size: 1.18rem; }
    }
  </style>
</head>

<!-- ═══════════ TOPBAR ═══════════ -->

  <div class="topbar-brand">

<script>
'use strict';

/* ═══════════════ CONFIGURAÇÃO ═══════════════ */
const CONFIG = {

};

/* ═══════════════ PERGUNTAS ═══════════════ */
const QUESTIONS = [
  {
    text: 'Quando você tenta conversar em Libras, qual situação mais parece com você?',
    opts: [
      { l: 'A', t: 'Não sei praticamente nada.', p: 1 },

  {

    opts: [

];

/* ═══════════════ DIAGNÓSTICOS ═══════════════ */
function getResult(nome, score) {
  if (score <= 14) {
    return {
      badge: '🌱 Base em Construção',
      title: `${nome}, você está no momento de construir uma base sólida em Libras.`,

      produto: {
        tag: '⭐ Indicado para você',
        nome: 'Do Zero à Libras',

    produto: {
      tag: '💜 Próximo passo para você',
      nome: 'Mentoria Destrava Libras',
      desc: 'Acompanhamento direto e personalizado com a Profa. Lorena. Ela analisa sua sinalização e te direciona para sinalizar com clareza, naturalidade e segurança.',

      link: CONFIG.LINK_MENTORIA,

/* ═══════════════ ESTADO ═══════════════ */
const state = {
  sessionId:   `qz_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`,
  nome:        '',
  email:       '',
  qIdx:        0,
  score:       0,
  respostas:   [],
  selectedOpt: null,
  busy:        false,   // trava contra cliques duplos
};

const $chat  = document.getElementById('chat-area');
const $inner = document.getElementById('chat-inner');
const $input = document.getElementById('input-inner');

/* ═══════════════ HELPERS ═══════════════ */
const escapeHTML = (s) => s.replace(/[&<>"']/g, (c) => ({
  '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
}[c]));

const wait = (ms) => new Promise((r) => setTimeout(r, ms));

function scrollBottom() {
  requestAnimationFrame(() => { $chat.scrollTop = $chat.scrollHeight; });
}

function avatarHTML() {
  return `<div class="msg-avatar"><img src="${CONFIG.AVATAR}" alt="" onerror="this.src='${CONFIG.AVATAR_FALLBACK}'"/></div>`;
}

function addMsg(html, type) {
  const row = document.createElement('div');
  row.className = `msg-row ${type}`;
  row.innerHTML = type === 'bot'
    ? `${avatarHTML()}<div class="msg-bubble">${html}</div>`
    : `<div class="msg-bubble">${html}</div>`;
  $inner.appendChild(row);
  scrollBottom();
}

function showTyping() {
  const row = document.createElement('div');
  row.className = 'typing-row';
  row.id = 'typing';
  row.innerHTML = `${avatarHTML()}<div class="typing-bubble" aria-label="Lorena está digitando">
    <span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>
  </div>`;
  $inner.appendChild(row);
  scrollBottom();
}

function hideTyping() {
  document.getElementById('typing')?.remove();
}

/** Exibe mensagens do bot em sequência, com indicador de digitação proporcional ao texto. */
async function botSay(messages) {
  for (const text of messages) {
    showTyping();
    await wait(Math.min(700 + text.length * 16, 1700));
    hideTyping();
    addMsg(text, 'bot');
    await wait(180);
  }
}

function setInput(html) { $input.innerHTML = html; }
function clearInput()   { $input.innerHTML = ''; }

/* ═══════════════ FLUXO ═══════════════ */
async function startIntro() {
  clearInput();
  await botSay([
    'Oi! Eu sou a Lorena, da Nerds da Libras 💙',
    'Preparei uma avaliação rápida para te ajudar a descobrir seu nível atual em Libras.',
    'São só 7 perguntas. No final, eu vou te mostrar qual é o seu momento atual e qual o próximo passo mais indicado para você.',
    'Antes de começar, como posso te chamar?',
  ]);
  showNameInput();
}

/* ── Nome ── */
function showNameInput() {
  setInput(`
    <div class="field-wrap">
      <input class="field-input" id="inp-nome" type="text"
        placeholder="Digite seu nome" maxlength="40"
        autocomplete="given-name" aria-label="Seu nome" autofocus/>
      <button class="btn-send" id="btn-nome" type="button">Enviar</button>
    </div>
    <span class="field-error" id="err-nome">Por favor, digite seu nome para continuar.</span>
  `);
  const inp = document.getElementById('inp-nome');
  inp.focus();
  inp.addEventListener('keydown', (e) => { if (e.key === 'Enter') submitNome(); });
  document.getElementById('btn-nome').addEventListener('click', submitNome);
}

async function submitNome() {
  if (state.busy) return;
  const inp = document.getElementById('inp-nome');
  const raw = inp.value.trim().replace(/\s+/g, ' ');
  if (raw.length < 2) {
    inp.classList.add('error');
    document.getElementById('err-nome').classList.add('show');
    inp.focus();
    return;
  }
  state.busy = true;
  // Capitaliza o primeiro nome
  const primeiro = raw.split(' ')[0];
  state.nome = primeiro.charAt(0).toUpperCase() + primeiro.slice(1).toLowerCase();

  clearInput();
  addMsg(escapeHTML(raw), 'user');
  await botSay([
    `Prazer, <strong>${escapeHTML(state.nome)}</strong>! Agora me passa seu melhor e-mail para eu salvar seu diagnóstico.`,
  ]);
  state.busy = false;
  showEmailInput();
}

/* ── E-mail ── */
function showEmailInput() {
  setInput(`
    <div class="field-wrap">
      <input class="field-input" id="inp-email" type="email"
        placeholder="Digite seu melhor e-mail" maxlength="80"
        autocomplete="email" inputmode="email" aria-label="Seu e-mail"/>
      <button class="btn-send" id="btn-email" type="button">Enviar</button>
    </div>
    <span class="field-error" id="err-email">Hmm, esse e-mail não parece válido. Confere e tenta de novo 😊</span>
  `);
  const inp = document.getElementById('inp-email');
  inp.focus();
  inp.addEventListener('keydown', (e) => { if (e.key === 'Enter') submitEmail(); });
  inp.addEventListener('input', () => {
    inp.classList.remove('error');
    document.getElementById('err-email').classList.remove('show');
  });
  document.getElementById('btn-email').addEventListener('click', submitEmail);
}

const isValidEmail = (e) => /^[^\s@]+@[^\s@]+\.[a-zA-Z]{2,}$/.test(e);

async function submitEmail() {
  if (state.busy) return;
  const inp = document.getElementById('inp-email');
  const email = inp.value.trim().toLowerCase();
  if (!isValidEmail(email)) {
    inp.classList.add('error');
    document.getElementById('err-email').classList.add('show');
    inp.focus();
    return;
  }
  state.busy = true;
  state.email = email;

  clearInput();
  addMsg(escapeHTML(email), 'user');

  sendCRM('lead_capturado');

  await botSay([
    `Perfeito, <strong>${escapeHTML(state.nome)}</strong>! Agora vamos começar sua avaliação. Responda com sinceridade, combinado? 🎯`,
  ]);

  state.busy = false;
  state.qIdx = 0;
  state.score = 0;
  state.respostas = [];
  askQuestion();
}

/* ── Perguntas ── */
async function askQuestion() {
  const q = QUESTIONS[state.qIdx];
  state.selectedOpt = null;

  showTyping();
  await wait(650);
  hideTyping();
  addMsg(escapeHTML(q.text), 'bot');

  renderOptions(q);
}

function renderOptions(q) {
  const n   = state.qIdx + 1;
  const pct = Math.round((n / QUESTIONS.length) * 100);

  const optsHTML = q.opts.map((op, i) => `
    <button class="opt-btn" type="button" data-idx="${i}" role="radio" aria-checked="false">
      <span class="opt-letter">${op.l}</span>
      <span>${escapeHTML(op.t)}</span>
    </button>`).join('');

  setInput(`
    <div class="progress-wrap">
      <div class="progress-label">
        <span>Pergunta <strong>${n}</strong> de ${QUESTIONS.length}</span>
        <span>${pct}%</span>
      </div>
      <div class="progress-track" role="progressbar" aria-valuenow="${pct}" aria-valuemin="0" aria-valuemax="100">
        <div class="progress-fill" style="width:${pct}%"></div>
      </div>
    </div>
    <div class="options-wrap" role="radiogroup" aria-label="Alternativas">${optsHTML}</div>
    <button class="btn-confirm" id="btn-confirm" type="button" disabled>Confirmar resposta →</button>
  `);

  $input.querySelectorAll('.opt-btn').forEach((btn) => {
    btn.addEventListener('click', () => {
      state.selectedOpt = Number(btn.dataset.idx);
      $input.querySelectorAll('.opt-btn').forEach((b) => {
        const sel = b === btn;
        b.classList.toggle('selected', sel);
        b.setAttribute('aria-checked', sel);
      });
      document.getElementById('btn-confirm').disabled = false;
    });
  });
  document.getElementById('btn-confirm').addEventListener('click', confirmAnswer);
}

async function confirmAnswer() {
  if (state.busy || state.selectedOpt === null) return;
  state.busy = true;

  const q   = QUESTIONS[state.qIdx];
  const opt = q.opts[state.selectedOpt];

  state.score += opt.p;
  state.respostas.push({ pergunta: q.text, alternativa: opt.l, resposta: opt.t, pontos: opt.p });

  clearInput();
  addMsg(escapeHTML(opt.t), 'user');
  await wait(350);

  state.busy = false;

  if (state.qIdx < QUESTIONS.length - 1) {
    state.qIdx++;
    askQuestion();
  } else {
    showResult();
  }
}

/* ── Resultado ── */
async function showResult() {
  clearInput();

  await botSay([
    'Pronto! Analisei suas respostas com carinho... ✨',
    `<strong>${escapeHTML(state.nome)}</strong>, aqui está o seu diagnóstico 👇`,
  ]);

  const r = getResult(escapeHTML(state.nome), state.score);

  const card = document.createElement('div');
  card.className = 'result-card';
  card.innerHTML = `
    <div class="result-badge">${r.badge}</div>
    <h2 class="result-title">${r.title}</h2>
    <div class="result-diag">${r.diag}</div>
    <span class="score-pill">📊 Pontuação: ${state.score} de ${QUESTIONS.length * 4}</span>
  `;
  $inner.appendChild(card);
  scrollBottom();

  await wait(900);
  await botSay([
    'Esse diagnóstico mostra seu ponto de partida. Agora o mais importante é escolher o próximo passo certo para evoluir com mais clareza e segurança.',
  ]);

  const p = r.produto;
  const prod = document.createElement('div');
  prod.className = 'produto-wrap';
  prod.innerHTML = `
    <div class="produto-card">
      <div class="produto-tag">${p.tag}</div>
      <div class="produto-nome">${p.nome}</div>
      <div class="produto-desc">${p.desc}</div>
      <a class="btn-cta" href="${p.link}" target="_blank" rel="noopener">${p.cta}</a>
    </div>
  `;
  $inner.appendChild(prod);

  setInput(`<button class="btn-restart" type="button" id="btn-restart">↩ Refazer o diagnóstico</button>`);
  document.getElementById('btn-restart').addEventListener('click', restartQuiz);
  scrollBottom();

  sendCRM('diagnostico_completo', {
    diagnostico:         r.badge.replace(/^\S+\s/, ''),
    produto_recomendado: p.nome,
  });
}

/* ═══════════════ CRM ═══════════════ */
function sendCRM(fase, extra = {}) {
  try {
    const payload = {
      sessionId: state.sessionId,
      nome:      state.nome,
      email:     state.email,
      score:     state.score,
      respostas: JSON.stringify(state.respostas),
      fase,
      fonte:     'quiz-libras',
      updatedAt: new Date().toISOString(),
      ...extra,
    };
    fetch(CONFIG.SHEETS_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(payload),
    }).catch(() => {});
  } catch (_) { /* nunca quebra a experiência por falha de rede */ }
}

/* ═══════════════ RESTART ═══════════════ */
function restartQuiz() {
  Object.assign(state, {
    sessionId:   `qz_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`,
    nome: '', email: '', qIdx: 0, score: 0,
    respostas: [], selectedOpt: null, busy: false,
  });
  $inner.innerHTML = '';
  clearInput();
  startIntro();
}

/* ═══════════════ INIT ═══════════════ */
startIntro();
</script>
