<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <meta name="theme-color" content="#202C33"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --wa-header:   #202C33;
      --wa-bg:       #0B141A;
      --wa-bot:      #202C33;
      --wa-user:     #005C4B;
      --wa-input-bg: #202C33;
      --wa-green:    #00A884;
      --wa-green-dk: #008C6F;
      --wa-text:     #E9EDEF;
      --wa-muted:    #8696A0;
      --wa-border:   rgba(255,255,255,.06);
      --wa-gold:     #F0BC44;
      --wa-red:      #F87171;
      --wa-tick:     #53BDEB;
      --radius-bot:  0 12px 12px 12px;
      --radius-user: 12px 0 12px 12px;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--wa-bg);
      font-family: 'Inter', system-ui, sans-serif;
      color: var(--wa-text);
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
      touch-action: manipulation;
    }

    /* ── WhatsApp bg pattern ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image:
        radial-gradient(circle, rgba(255,255,255,.018) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
    }

    /* ═══════════ LAYOUT ═══════════ */
    #app {
      position: fixed; inset: 0; z-index: 1;
      display: flex; flex-direction: column;
      height: 100%;
      height: 100dvh;
    }

    /* ═══════════ HEADER ═══════════ */
    .wa-header {
      background: var(--wa-header);
      display: flex; align-items: center; gap: 12px;
      padding: 10px 16px;
      padding-top: calc(10px + env(safe-area-inset-top));
      flex-shrink: 0;
      box-shadow: 0 1px 3px rgba(0,0,0,.4);
      z-index: 10;
      position: relative;
    }
    .wa-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      overflow: hidden; flex-shrink: 0;
      border: 2px solid rgba(0,168,132,.4);
    }
    .wa-avatar img {
      width: 100%; height: 100%;
      object-fit: cover; object-position: top;
      display: block;
    }
    .wa-info { flex: 1; min-width: 0; }
    .wa-name {
      font-size: .95rem; font-weight: 700;
      color: var(--wa-text); line-height: 1.2;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .wa-status {
      display: flex; align-items: center; gap: 5px;
      font-size: .72rem; color: var(--wa-green); margin-top: 1px;
    }
    .wa-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--wa-green);
      animation: waPulse 2s ease-in-out infinite;
    }
    @keyframes waPulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .wa-back {
      font-size: .78rem; color: var(--wa-muted);
      text-decoration: none; padding: 6px 0;
      white-space: nowrap; flex-shrink: 0;
    }
    .wa-back:active { color: var(--wa-text); }

    /* ═══════════ CHAT AREA ═══════════ */
    .chat-scroll {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      padding: 12px 12px 8px;
      position: relative;
      z-index: 1;
    }
    .chat-scroll::-webkit-scrollbar { display: none; }

    .chat-inner {
      display: flex; flex-direction: column;
      gap: 3px;
      max-width: 600px;
      margin: 0 auto;
    }

    /* ── date chip ── */
    .date-chip {
      text-align: center; margin: 10px 0 6px;
    }
    .date-chip span {
      background: rgba(17,27,33,.85);
      color: var(--wa-muted);
      font-size: .68rem; font-weight: 600;
      padding: 4px 12px; border-radius: 8px;
    }

    /* ── message rows ── */
    .msg-row {
      display: flex;
      opacity: 0; transform: translateY(8px);
      animation: msgIn .25s ease forwards;
    }
    @keyframes msgIn { to { opacity:1; transform:translateY(0); } }
    @media (prefers-reduced-motion: reduce) {
      .msg-row { animation-duration:.01s !important; }
    }

    .msg-row.bot  { justify-content: flex-start; padding-left: 4px; }
    .msg-row.user { justify-content: flex-end;   padding-right: 4px; }

    /* add margin between different senders */
    .msg-row.bot  + .msg-row.user,
    .msg-row.user + .msg-row.bot  { margin-top: 6px; }

    .msg-bubble {
      position: relative;
      padding: 9px 12px 20px;
      border-radius: 12px;
      font-size: .92rem; line-height: 1.55;
      max-width: min(78vw, 340px);
      word-wrap: break-word;
      word-break: break-word;
    }
    .bot .msg-bubble {
      background: var(--wa-bot);
      border-radius: var(--radius-bot);
    }
    .user .msg-bubble {
      background: var(--wa-user);
      border-radius: var(--radius-user);
    }
    .msg-bubble strong { color: var(--wa-gold); font-weight: 700; }

    /* timestamp inside bubble */
    .msg-time {
      position: absolute; bottom: 5px; right: 10px;
      font-size: .62rem; color: rgba(255,255,255,.45);
      white-space: nowrap;
    }
    .user .msg-time { color: rgba(255,255,255,.55); }

    /* ── WhatsApp tail ── */
    .bot .msg-bubble::before {
      content: '';
      position: absolute; top: 0; left: -8px;
      border: 8px solid transparent;
      border-top-color: var(--wa-bot);
      border-right-color: var(--wa-bot);
      border-top-left-radius: 0;
    }
    .user .msg-bubble::before {
      content: '';
      position: absolute; top: 0; right: -8px;
      border: 8px solid transparent;
      border-top-color: var(--wa-user);
      border-left-color: var(--wa-user);
    }

    /* ── typing indicator ── */
    .typing-row {
      display: flex; align-items: flex-end;
      padding-left: 4px; margin-top: 3px;
    }
    .typing-bubble {
      background: var(--wa-bot);
      border-radius: var(--radius-bot);
      padding: 12px 14px;
      display: flex; gap: 4px; align-items: center;
    }
    .typing-bubble::before {
      content: '';
      position: absolute; top: 0; left: -8px;
      border: 8px solid transparent;
      border-top-color: var(--wa-bot);
      border-right-color: var(--wa-bot);
    }
    .t-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--wa-muted);
      animation: tDot 1.2s ease-in-out infinite;
    }
    .t-dot:nth-child(2) { animation-delay: .2s; }
    .t-dot:nth-child(3) { animation-delay: .4s; }
    @keyframes tDot { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

    /* ═══════════ INPUT AREA ═══════════ */
    .input-area {
      flex-shrink: 0;
      background: var(--wa-header);
      padding: 8px 12px;
      padding-bottom: calc(8px + env(safe-area-inset-bottom));
      z-index: 10;
    }
    .input-inner {
      display: flex; flex-direction: column; gap: 8px;
      max-width: 600px; margin: 0 auto;
    }
    .input-inner:empty ~ .input-area { display: none; }

    /* ── text input row ── */
    .field-row { display: flex; gap: 8px; align-items: flex-end; }
    .field-box {
      flex: 1; min-width: 0;
      background: #2A3942;
      border: none; border-radius: 24px;
      color: var(--wa-text);
      font: inherit; font-size: 1rem;
      padding: 11px 18px;
      outline: none;
      line-height: 1.4;
      -webkit-appearance: none;
    }
    .field-box::placeholder { color: var(--wa-muted); }
    .field-box.error { box-shadow: 0 0 0 2px rgba(248,113,113,.5); }

    .field-textarea {
      width: 100%;
      background: #2A3942;
      border: none; border-radius: 16px;
      color: var(--wa-text);
      font: inherit; font-size: 1rem;
      padding: 12px 16px;
      outline: none;
      resize: none;
      min-height: 80px;
      max-height: 160px;
      line-height: 1.5;
      -webkit-appearance: none;
    }
    .field-textarea::placeholder { color: var(--wa-muted); }

    .field-error {
      font-size: .75rem; color: var(--wa-red);
      padding-left: 8px; display: none;
    }
    .field-error.show { display: block; }

    /* ── send button ── */
    .btn-wa-send {
      width: 44px; height: 44px; flex-shrink: 0;
      background: var(--wa-green);
      border: none; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background .15s, transform .1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-wa-send:active { background: var(--wa-green-dk); transform: scale(.94); }
    .btn-wa-send svg { width: 20px; height: 20px; fill: #fff; }

    .btn-wa-full {
      width: 100%;
      background: var(--wa-green);
      border: none; border-radius: 24px;
      color: #fff; font: inherit; font-weight: 700; font-size: .95rem;
      padding: 13px 20px; cursor: pointer;
      transition: background .15s, transform .1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-wa-full:active { background: var(--wa-green-dk); transform: scale(.98); }

    /* ── progress bar ── */
    .progress-card {
      background: #2A3942;
      border-radius: 14px;
      padding: 10px 14px;
    }
    .progress-top {
      display: flex; justify-content: space-between;
      font-size: .72rem; color: var(--wa-muted);
      margin-bottom: 7px; font-weight: 500;
    }
    .progress-top strong { color: var(--wa-gold); }
    .progress-track {
      height: 3px; background: rgba(255,255,255,.1);
      border-radius: 999px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; border-radius: 999px;
      background: linear-gradient(90deg, var(--wa-green), #00D4AA);
      transition: width .4s ease;
    }

    /* ── options ── */
    .opts-wrap { display: flex; flex-direction: column; gap: 7px; }
    .opt-btn {
      display: flex; align-items: center; gap: 11px;
      background: #2A3942;
      border: 1.5px solid transparent;
      border-radius: 12px;
      padding: 12px 14px;
      cursor: pointer; text-align: left;
      color: var(--wa-text); font: inherit;
      font-size: .9rem; line-height: 1.4;
      transition: background .12s, border-color .12s;
      width: 100%;
      -webkit-tap-highlight-color: transparent;
      min-height: 48px;
    }
    .opt-btn:active, .opt-btn.selected {
      background: rgba(0,168,132,.15);
      border-color: var(--wa-green);
    }
    .opt-letter {
      width: 26px; height: 26px; flex-shrink: 0;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,.18);
      display: flex; align-items: center; justify-content: center;
      font-size: .7rem; font-weight: 800; color: var(--wa-muted);
      transition: all .12s;
    }
    .opt-btn.selected .opt-letter {
      background: var(--wa-green); border-color: var(--wa-green); color: #fff;
    }

    .btn-confirm {
      background: var(--wa-green);
      border: none; border-radius: 24px;
      color: #fff; font: inherit; font-weight: 700; font-size: .92rem;
      padding: 13px 20px; cursor: pointer; width: 100%;
      transition: background .15s, opacity .2s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-confirm:active { background: var(--wa-green-dk); }
    .btn-confirm:disabled { opacity: .35; cursor: not-allowed; }

    /* ═══════════ CARDS (resultado / oferta / produto) ═══════════ */
    .card {
      background: var(--wa-bot);
      border-radius: 12px;
      padding: 18px 16px;
      opacity: 0; transform: translateY(8px);
      animation: msgIn .3s ease forwards;
      margin: 4px 4px 4px 4px;
      max-width: min(78vw, 340px);
    }
    .card.full { max-width: 100%; margin: 6px 0; }

    .card-badge {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(240,188,68,.12);
      border: 1px solid rgba(240,188,68,.3);
      color: var(--wa-gold);
      border-radius: 999px;
      padding: 4px 12px;
      font-size: .67rem; font-weight: 800;
      letter-spacing: .07em; text-transform: uppercase;
      margin-bottom: 12px;
    }
    .card-title {
      font-size: 1rem; font-weight: 800; color: #fff;
      line-height: 1.35; margin-bottom: 12px;
    }
    .card-body {
      background: rgba(0,0,0,.2);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: .85rem; color: #C9D1D9; line-height: 1.75;
    }
    .card-body strong { color: var(--wa-gold); }

    /* oferta */
    .oferta-tag {
      font-size: .66rem; font-weight: 800; text-transform: uppercase;
      letter-spacing: .08em; color: var(--wa-green); margin-bottom: 8px;
    }
    .oferta-nome {
      font-size: .97rem; font-weight: 800; color: #fff;
      margin-bottom: 6px; line-height: 1.3;
    }
    .oferta-desc {
      font-size: .82rem; color: var(--wa-muted);
      line-height: 1.6; margin-bottom: 14px;
    }
    .preco-row {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 14px; flex-wrap: wrap;
    }
    .preco-de {
      font-size: .82rem; color: var(--wa-muted);
      text-decoration: line-through;
    }
    .preco-por {
      font-size: 1.35rem; font-weight: 900;
      color: #4ADE80; letter-spacing: -.02em;
    }
    .preco-tag {
      background: rgba(74,222,128,.15);
      border: 1px solid rgba(74,222,128,.3);
      color: #4ADE80;
      border-radius: 999px;
      padding: 2px 10px;
      font-size: .67rem; font-weight: 800;
    }

    /* sim/não buttons */
    .btn-sim {
      display: block; width: 100%;
      background: var(--wa-green);
      color: #fff; text-decoration: none; text-align: center;
      border: none; border-radius: 10px;
      padding: 14px 18px;
      font: inherit; font-weight: 800; font-size: .92rem;
      cursor: pointer; margin-bottom: 8px;
      transition: background .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-sim:active { background: var(--wa-green-dk); }

    .btn-nao {
      display: block; width: 100%;
      background: transparent;
      border: 1px solid rgba(255,255,255,.15);
      color: var(--wa-muted); border-radius: 10px;
      padding: 12px 18px;
      font: inherit; font-size: .82rem; font-weight: 600;
      cursor: pointer; text-align: center;
      transition: color .15s, border-color .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-nao:active { border-color: rgba(255,255,255,.3); color: var(--wa-text); }

    .btn-cta {
      display: block; width: 100%;
      background: linear-gradient(135deg, var(--wa-green) 0%, #00D4AA 100%);
      color: #fff; text-decoration: none; text-align: center;
      border-radius: 10px;
      padding: 14px 18px;
      font-weight: 800; font-size: .92rem;
      transition: opacity .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-cta:active { opacity: .88; }

    .urgencia-chip {
      display: flex; align-items: center; gap: 7px;
      background: rgba(248,113,113,.1);
      border: 1px solid rgba(248,113,113,.25);
      border-radius: 8px;
      padding: 9px 12px;
      font-size: .76rem; color: #FCA5A5; font-weight: 600;
      line-height: 1.4; margin-bottom: 12px;
    }

    .btn-restart {
      background: transparent;
      border: 1px solid rgba(255,255,255,.12);
      color: var(--wa-muted); border-radius: 10px;
      padding: 11px 18px;
      font: inherit; font-size: .8rem; font-weight: 600;
      cursor: pointer; width: 100%;
      text-align: center;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-restart:active { color: var(--wa-text); }
  </style>
</head>

const $scroll = document.getElementById('chat-scroll');
const $inner  = document.getElementById('chat-inner');
const $inp    = document.getElementById('input-inner');

/* ═══════════ HELPERS ═══════════ */
const esc = s => String(s).replace(/[&<>"']/g, c =>
  ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

const wait = ms => new Promise(r => setTimeout(r, ms));

function now() {
  return new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
}

function scrollEnd() {
  requestAnimationFrame(() => { $scroll.scrollTop = $scroll.scrollHeight + 200; });
}

function addMsg(html, side) {
  const row = document.createElement('div');
  row.className = `msg-row ${side}`;
  row.innerHTML = `<div class="msg-bubble">${html}<span class="msg-time">${now()}</span></div>`;
  $inner.appendChild(row);
  scrollEnd();
}

let typingEl = null;
function showTyping() {
  typingEl = document.createElement('div');
  typingEl.className = 'typing-row';
  typingEl.innerHTML = `<div class="typing-bubble">
    <span class="t-dot"></span><span class="t-dot"></span><span class="t-dot"></span>
  </div>`;
  $inner.appendChild(typingEl);
  scrollEnd();
}
function hideTyping() { typingEl?.remove(); typingEl = null; }

async function botSay(msgs) {
  for (const txt of msgs) {
    showTyping();
    // tempo "digitando" (antecipação) — curto e proporcional ao texto
    await wait(Math.min(650 + txt.length * 11, 1500));
    hideTyping();
    addMsg(txt, 'bot');
    // PAUSA DE LEITURA: dá tempo de ler a mensagem antes da próxima
    // (proporcional ao tamanho — ~quanto maior, mais tempo)
    await wait(Math.min(1400 + txt.length * 33, 4500));
  }
}

function setInp(html) { $inp.innerHTML = html; }
function clearInp()   { $inp.innerHTML = ''; }

/* ═══════════ FLUXO ═══════════ */

/* 5. PERGUNTAS */
async function askQ() {
  const q = QUESTIONS[S.qIdx];
  S.sel = null;
  showTyping();
  await wait(700);
  hideTyping();
  addMsg(esc(q.text), 'bot');
  renderOpts(q);
}

function renderOpts(q) {
  const n   = S.qIdx + 1;
  const pct = Math.round(n / QUESTIONS.length * 100);
  const optsHTML = q.opts.map((op,i) => `
    <button class="opt-btn" type="button" data-i="${i}">
      <span class="opt-letter">${op.l}</span>
      <span>${esc(op.t)}</span>
    </button>`).join('');

  setInp(`
    <div class="progress-card">
      <div class="progress-top">
        <span>Pergunta <strong>${n}</strong> de ${QUESTIONS.length}</span>
        <span>${pct}%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" style="width:${pct}%"></div>
      </div>
    </div>
    <div class="opts-wrap">${optsHTML}</div>
    <button class="btn-confirm" id="b-confirm" type="button" disabled>Confirmar →</button>
  `);

  $inp.querySelectorAll('.opt-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      S.sel = Number(btn.dataset.i);
      $inp.querySelectorAll('.opt-btn').forEach(b => {
        const on = b === btn;
        b.classList.toggle('selected', on);
      });
      document.getElementById('b-confirm').disabled = false;
    });
  });
  document.getElementById('b-confirm').addEventListener('click', confirmAns);
}

async function confirmAns() {
  if(S.busy || S.sel === null) return;
  S.busy = true;
  const q = QUESTIONS[S.qIdx];
  const op = q.opts[S.sel];
  S.score += op.p;
  S.respostas.push({ p: q.text, r: op.t, pts: op.p });
  clearInp();
  addMsg(esc(op.t), 'user');
  await wait(300);
  S.busy = false;
  const rn = S.qIdx + 1;
  sendCRM({ etapaQuiz:`Pergunta ${rn}/${QUESTIONS.length} respondida`, statusCloser:`📝 Respondeu ${rn}/${QUESTIONS.length} do quiz` });
  if(S.qIdx < QUESTIONS.length - 1) { S.qIdx++; askQ(); }
  else showResult();
}

/* 6. RESULTADO */
function nivelKey(s) {
  if(s <= 7)  return 'basico';
  if(s <= 13) return 'intermediario';
  return 'avancado';
}

// Analisa a resposta ABERTA (experiência) e refina a recomendação.
// Nunca rebaixa: só SOBE o nível quando o texto mostra intenção clara
// (profissional/fluência), pra um lead motivado não receber só o ebook.
function refinarNivel(nv, exp) {
  const t = ' ' + String(exp || '').toLowerCase() + ' ';
  const profissional = /(int[ée]rprete|interpreta|tradu[çz]|profiss|trabalh|atuar|emprego|mercado|contrat|\bcas\b|banca|concurso|profess|escola|faculdade|letras libras|p[óo]s[\s-]*grad|certifica)/.test(t);
  const fluencia      = /(flu[êe]nc|fluente|avan[çc]ad|domino|sou fluente|me comunico bem|j[áa] trabalho)/.test(t);
  // Intenção profissional forte não pode ficar só no ebook → sobe pro curso
  if (nv === 'basico' && profissional) return 'intermediario';
  // Já tem fluência + objetivo profissional → mentoria
  if (nv === 'intermediario' && fluencia && profissional) return 'avancado';
  return nv;
}

async function showResult() {
  clearInp();
  await botSay([
    'Pronto! Analisei tuas respostas com cuidado... ✨',
    `<strong>${esc(S.nome)}</strong>, aqui está o seu diagnóstico 👇`,

  S.nivelKey = refinarNivel(nivelKey(S.score), S.exp);
  const p = CONFIG.PRODUTOS[S.nivelKey];

  sendCRM({
    concluiuQuiz: true,
    etapaQuiz:    '5. Concluiu o quiz — viu o diagnóstico',
    statusCloser: `🎯 Concluiu o quiz — Nível ${p.nivel} · indicado: ${p.nome}`,
  });

  const diags = {
    basico: `Você está dando os primeiros passos — e isso é muito melhor do que ficar parado(a) sem direção. A maioria das pessoas que trava em Libras não travou por falta de esforço: <strong>travou por falta do caminho certo.</strong><br/><br/>Você precisa de uma base sólida e entender o que a profissão realmente exige.`,
    intermediario: `Você já tem base — já estudou, já se comunicou com surdos. Mas tem uma trava. Sabe por quê? <strong>Você aprendeu sem método, e sem método não existe fluência.</strong><br/><br/>A boa notícia: você não precisa recomeçar do zero. Você precisa de um método que organize o que sabe e te leve até a comunicação real.`,
    avancado: `Você já tem uma trajetória sólida. Já se comunica, já tem experiência. O que te separa da <strong>fluência profissional</strong> não é mais conteúdo — é lapidação, imersão e acompanhamento especializado.<br/><br/>Você não precisa de mais teoria. Precisa de quem olhe para a sua sinalização e mostre o que falta.`,
  };

  const titulos = {
    basico:        `${esc(S.nome)}, seu nível é Básico — e esse é o ponto de partida para tudo mudar.`,
    intermediario: `${esc(S.nome)}, seu nível é Intermediário — você tem base, mas está travado(a).`,
    avancado:      `${esc(S.nome)}, seu nível é Avançado — você está a um passo da fluência profissional.`,
  };

  // card resultado (alinhado como bot)
  const card = document.createElement('div');
  card.className = 'msg-row bot';
  card.innerHTML = `<div class="card">
    <div class="card-badge">${p.badge}</div>
    <div class="card-title">${titulos[S.nivelKey]}</div>
    <div class="card-body">${diags[S.nivelKey]}</div>
  </div>`;
  $inner.appendChild(card);
  scrollEnd();

  await wait(1100);
  const isGrupo = S.nivelKey === 'avancado';
  let preOferta;
  if (S.nivelKey === 'basico') {
    // Nível básico → ebook como porta de entrada, plantando o curso como próximo passo
    preOferta = [
      `Como você está começando agora, não faz sentido te empurrar um curso completo de cara — o caminho certo é dar o primeiro passo sem peso. 🌱`,
      `A sua porta de entrada ideal é o <strong>${esc(p.nome)}</strong> por só <strong>R$ 19,90</strong>: ele te mostra todo o caminho e o que a profissão realmente exige.`,
      `E o seu próximo passo natural — quando quiser aprender Libras de verdade, do zero à fluência — é o curso <strong>Do Zero a Libras</strong>. Mas uma coisa de cada vez, combinado? 😉`,
    ];
  } else if (isGrupo) {
    preOferta = [
      `O próximo passo para você sair do <strong>${p.nivel}</strong> e chegar na fluência profissional é ter acompanhamento de perto. 🎯`,
      `Se eu te convidar agora para entrar no grupo exclusivo da <strong>3ª Turma do Ciclo da Fluência</strong> — que abre dia 20 de julho com oferta especial de lançamento — você entraria agora?`,
    ];
  } else {
    preOferta = [
      `O próximo passo para você sair do <strong>${p.nivel}</strong> e avançar de verdade é o curso <strong>Do Zero a Libras</strong> — e eu sei exatamente como ele encaixa no seu momento. 🎯`,
      `Mas preciso ser sincera com você: essa <strong>oferta com desconto só aparece UMA vez</strong> — agora, pra quem faz o quiz pela primeira vez. Depois que você sair daqui, ela não volta. ⏳`,
      `E pra você ir com total tranquilidade: aproveita a condição, e se não gostar ou se arrepender (coisa que eu acho bem difícil acontecer, viu? 😄) você tem <strong>7 dias pra testar</strong>. Se não for pra você, eu <strong>te devolvo todo o seu dinheiro</strong> — e a nossa amizade continua. 💙`,
      `Posso te liberar essa oferta única agora?`,
    ];
  }
  await botSay(preOferta);

  showOferta(p, isGrupo);

    <div class="preco-row">
      <span class="preco-de">${p.preco_de}</span>
      <span class="preco-por">${p.preco_por}</span>
      <span class="preco-tag">${p.desconto}</span>
    </div>
    <a class="btn-cta" href="${p.link}" target="_blank" rel="noopener" onclick="registrarCliqueCTADownsell()">${p.cta}</a>
  </div>`;
  $inner.appendChild(div);
  scrollEnd();
}

// Clique no ebook do downsell → registra como oferta da Eduzz (fora do remarketing da Kiwify)
function registrarCliqueCTADownsell() {
  sendCRM({
    clicouOferta:     true,
    ofertaEm:         new Date().toISOString(),
    oferta:           'ebook',
    plataformaOferta: 'eduzz',
    etapaQuiz:        '7. Clicou no ebook (downsell R$ 19,90)',
    statusCloser:     '🛒 Clicou no ebook (downsell) — foi para a Eduzz',
  });
}

/* ═══════════ CRM ═══════════ */
// Mapas nivelKey → campos que o CRM/planilha entende
const OFERTA_MAP = { basico:'curso', intermediario:'curso', avancado:'mentoria' };
const NIVEL_MAP  = { basico:'Básico', intermediario:'Intermediário', avancado:'Avançado' };
const CLASS_MAP  = { basico:'FRIO', intermediario:'MORNO', avancado:'QUENTE' };

// Descobre a plataforma de checkout a partir do link do produto
function plataformaFromLink(url) {
  const u = String(url || '');
  if (u.indexOf('kiwify')   >= 0) return 'kiwify';
  if (u.indexOf('eduzz')    >= 0) return 'eduzz';
  if (u.indexOf('whatsapp') >= 0) return 'grupo';
  return '';
}

// Monta o payload com os MESMOS nomes de campo do CRM (nada se perde)
function crmPayload(extra = {}) {
  return {
    sessionId:         S.id,
    nome:              S.nome,
    whatsapp:          S.whatsapp,
    email:             S.email,
    origem:            'quiz-libras',
    iniciouQuiz:       true,
    experiencia:       S.exp,
    pontuacao:         S.score,
    respostasQuiz:     JSON.stringify(S.respostas),
    nivelIdentificado: S.nivelKey ? NIVEL_MAP[S.nivelKey]  : '',
    oferta:            S.nivelKey ? OFERTA_MAP[S.nivelKey] : '',
    plataformaOferta:  S.nivelKey ? plataformaFromLink(CONFIG.PRODUTOS[S.nivelKey].link) : '',
    resultado:         S.nivelKey ? CONFIG.PRODUTOS[S.nivelKey].nome : '',
    classificacaoLead: S.nivelKey ? CLASS_MAP[S.nivelKey] : '',
    updatedAt:         new Date().toISOString(),
    ...extra,
  };
}

function sendCRM(extra = {}) {
  try {
    const body = JSON.stringify(crmPayload(extra));
    // sendBeacon entrega mesmo se a aba fechar logo depois
    if (navigator.sendBeacon) {
      navigator.sendBeacon(CONFIG.SHEETS_URL, body);
    } else {
      fetch(CONFIG.SHEETS_URL, {
        method:'POST', mode:'no-cors',
        headers:{'Content-Type':'text/plain'}, body,
      }).catch(()=>{});
    }
  } catch(_){}
}

// Clique no link da oferta = foi para a página de pagamento
function registrarCliqueCTA() {
  sendCRM({
    clicouOferta: true,
    ofertaEm:     new Date().toISOString(),
    etapaQuiz:    '7. Clicou no link da oferta (foi pro checkout)',
    statusCloser: '🛒 Clicou no link da oferta — foi para a página de pagamento',
  });
}

// Se a pessoa fechar a aba NO MEIO das perguntas, registra onde parou
window.addEventListener('pagehide', () => {
  const n = S.respostas.length;
  if (S.email && n > 0 && n < QUESTIONS.length) {
    sendCRM({
      etapaQuiz:    `Saiu no meio — última: Pergunta ${n}/${QUESTIONS.length}`,
      statusCloser: `🚪 Abandonou o quiz na pergunta ${n}/${QUESTIONS.length}`,
    });
  }
});

/* ═══════════ RESTART ═══════════ */
function restart() {
  Object.assign(S, {
    id:`qz_${Date.now()}_${Math.random().toString(36).slice(2,7)}`,
    nome:'', whatsapp:'', email:'', exp:'', qIdx:0, score:0,
    respostas:[], sel:null, nivelKey:'', busy:false,
  });
  $inner.innerHTML = '';
  clearInp();
  startIntro();
}

/* ═══════════ INIT ═══════════ */
startIntro();
</script>
