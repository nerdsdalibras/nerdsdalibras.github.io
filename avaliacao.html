    html { scroll-behavior: smooth; }
    body {

    /* ── HEADER CHAT ── */
    .chat-header {
      background: var(--bg-lorena);
      padding: 10px 16px 10px 12px;

    .header-info { flex: 1; }
    .header-name { font-weight: 700; color: var(--text-main); font-size: .95rem; }
    .header-status { font-size: .72rem; color: var(--verde); display: flex; align-items: center; gap: 5px; }
    .dot-online {

    .bubble-avatar { width: 28px; height: 28px; border-radius: 50%; overflow: hidden; flex-shrink: 0; border: 1.5px solid rgba(37,211,102,.4); margin-bottom: 2px; }
    .bubble-avatar img { width: 100%; height: 100%; object-fit: cover; object-position: top; }

    .bubble {

      padding: 10px 14px;
      font-size: .88rem; color: var(--text-main); line-height: 1.55;
    }
    .bubble strong { color: #a8efca; font-weight: 700; }
    .bubble em { font-style: normal; color: var(--verde); font-weight: 600; }
    .bubble-time { font-size: .65rem; color: var(--text-time); text-align: right; margin-top: 4px; }

    /* ── DIGITANDO ── */
    .typing-wrap { display: none; align-items: flex-end; gap: 8px; max-width: 88%; }
    .typing-wrap.show { display: flex; animation: fadeUp .3s ease; }
    .typing-bubble {

    }

    .typing-dot:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }
    .msg-gap { height: 6px; }

    /* ── BOLHA USUÁRIO ── */
    .user-bubble-wrap { display: flex; justify-content: flex-end; animation: fadeUp .3s ease; margin-left: auto; }
    .user-bubble {
      background: #005C4B; border-radius: 16px 4px 16px 16px;
      padding: 10px 14px; font-size: .88rem; color: var(--text-main);
      line-height: 1.5; max-width: 80%;

    .user-bubble-time {
      font-size: .65rem; color: rgba(37,211,102,.5);
      text-align: right; margin-top: 4px;
      display: flex; align-items: center; justify-content: flex-end; gap: 4px;

    .cert-sub { font-size: .7rem; color: rgba(255,255,255,.35); margin-top: 4px; }

    .result-wrap { display: none; margin: 12px 0 8px 36px; animation: fadeUp .5s ease; }
    .result-wrap.show { display: block; }
    .result-card {

    .result-card.aval-card { border-color: rgba(201,150,58,.3); }

    .result-photo { position: relative; height: 230px; overflow: hidden; }

    .result-pill-top {

      body { background: #060C10; }
      .phone { margin: 0 auto; box-shadow: 0 0 80px rgba(0,0,0,.8); }

const chatBody   = document.getElementById('chat-body');
const typingWrap = document.getElementById('typing-wrap');
const anchor     = document.getElementById('scroll-anchor');

function hora() {
  const d = new Date();
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}

function scrollDown() {
  anchor.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

function showTyping() { typingWrap.classList.add('show'); scrollDown(); }
function hideTyping() { typingWrap.classList.remove('show'); }

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function addBubble(html, delay) {
  showTyping();
  const d = delay ?? Math.min(900 + html.replace(/<[^>]+>/g, '').length * 22, 3500);
  await sleep(d);
  hideTyping();
  const wrap = document.createElement('div');
  wrap.className = 'bubble-wrap';
  wrap.innerHTML = `
    <div class="bubble-avatar"><img src="fotos/IMG_4952.jpg" alt="Lorena"/></div>
    <div class="bubble">${html.replace(/\n/g,'<br/>')}<div class="bubble-time">${hora()}</div></div>`;
  chatBody.insertBefore(wrap, typingWrap);
  scrollDown();
  await sleep(150);
}

function addUserBubble(text) {
  const wrap = document.createElement('div');
  wrap.className = 'user-bubble-wrap';
  wrap.innerHTML = `
    <div class="user-bubble">${text}
      <div class="user-bubble-time">${hora()} <span style="color:var(--verde)">✓✓</span></div>
    </div>`;
  chatBody.insertBefore(wrap, typingWrap);
  scrollDown();
}

function addElement(el) {
  chatBody.insertBefore(el, typingWrap);
  scrollDown();
}

function renderPergunta() {
  optSelected = null;
  const q = QUESTIONS[quizStep];
  const n = quizStep + 1;
  const pct = Math.round((n / 12) * 100);

  const wrap = document.createElement('div');
  wrap.className = 'quiz-wrap show';
  wrap.innerHTML = `
    <div class="quiz-progress">
      <span>${n} / 12</span>
      <div class="quiz-bar-track"><div class="quiz-bar-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="quiz-question">${q.text}</div>
    <div id="quiz-opts">
      ${q.opts.map((op, i) => `
        <button class="quiz-opt" onclick="selecionarOpt(${i})" id="opt-${i}">

          <span>${op.t}</span>
        </button>`).join('')}
    </div>
    <button class="btn-proximo" id="btn-prox" onclick="proximaPergunta()" disabled>
      ${quizStep < 11 ? 'Próxima →' : 'Ver meu resultado →'}

  addElement(wrap);

function selecionarOpt(idx) {
  optSelected = idx;
  currentQuizWrap.querySelectorAll('.quiz-opt').forEach((b, i) => {
    b.classList.toggle('selected', i === idx);
  });
  const btn = currentQuizWrap.querySelector('.btn-proximo');
  if (btn) btn.disabled = false;
}

async function proximaPergunta() {
  if (optSelected === null) return;
  const q = QUESTIONS[quizStep];
  const pts = q.opts[optSelected].p;

  if (quizStep === 0) { q1DifIdx = optSelected; lead.respostaDificuldade = q.opts[optSelected].t; }
  if (quizStep === 1) { q2ObjIdx = optSelected; lead.respostaObjetivo    = q.opts[optSelected].t; }
  quizScore += pts;

  const textoEscolhido = q.opts[optSelected].t;
  currentQuizWrap.style.opacity = '.3';
  currentQuizWrap.style.pointerEvents = 'none';
  addUserBubble(textoEscolhido.replace(/"/g, ''));
  await sleep(400);

  if (quizStep < 11) {
    quizStep++;
    renderPergunta();
  } else {
    await finalizarQuiz();
  }
}

function contarRegressiva(totalSeg, wrapEl) {
  return new Promise(resolve => {
    let restante = totalSeg;
    const timerEl = document.getElementById('agu-timer');
    const fillEl  = document.getElementById('agu-fill');
    const tick = () => {
      restante--;
      const m = String(Math.floor(restante / 60)).padStart(2, '0');
      const s = String(restante % 60).padStart(2, '0');
      if (timerEl) timerEl.textContent = `${m}:${s}`;
      if (fillEl)  fillEl.style.width  = `${(restante / totalSeg) * 100}%`;
      if (restante <= 0) resolve();
      else setTimeout(tick, 1000);
    };
    setTimeout(tick, 1000);
  });
}

}

// Regras de diagnóstico:
// Score base: soma das 12 questões (0–48)
// Bônus objetivo Q2: OBJ_BONUS[q2ObjIdx]
// Score ajustado = base + bônus
// Segurança: se Q1=A (iniciante completo) E ajustado ≤ 22 → sempre Básico
// ≤ 14 → Básico | 15-30 → Intermediário | > 30 → Avançado
function calcularNivel() {
  const bonus    = (q2ObjIdx !== null) ? OBJ_BONUS[q2ObjIdx] : 0;
  const adjusted = quizScore + bonus;
  if (q1DifIdx === 0 && adjusted <= 22) return 'basico';
  if (adjusted <= 14)  return 'basico';
  if (adjusted <= 30)  return 'intermediario';
  return 'avancado';
}

async function mostrarResultado() {
  const nivel = calcularNivel();
  const nivelLabels = { basico: 'BÁSICO', intermediario: 'INTERMEDIÁRIO', avancado: 'AVANÇADO' };

  lead.nivelIdentificado = nivelLabels[nivel];
  lead.resultado         = nivel !== 'avancado' ? 'Curso' : 'Mentoria';
  lead.grupoIndicado     = nivel !== 'avancado' ? 'Grupo do Curso' : 'Grupo da Mentoria';
  lead.resultadoEnviado  = true;
  lead.statusCloser      = 'Aguardando resposta sobre próximo nível';
  salvarPlanilha();

  // 1. Certificado visual
  mostrarCertificado(nivel);
  await sleep(900);

  // 2. Explicação rápida do resultado
  const explicacoes = {
    basico:        `<strong>${lead.nome}</strong>, com base nas suas respostas você está no nível <strong>BÁSICO</strong> em Libras. 🌱\n\nIsso significa que você ainda está construindo sua base — aprender sinais em contexto, formar frases simples e ganhar segurança para se comunicar são os seus próximos passos.`,
    intermediario: `<strong>${lead.nome}</strong>, com base nas suas respostas você está no nível <strong>INTERMEDIÁRIO</strong> em Libras. ✨\n\nVocê já tem contato com a língua — e isso é muito! Mas para consolidar esse conhecimento do jeito certo e estar preparada para o próximo passo, você precisa de uma base estruturada. É exatamente aí que entra o próximo nível.`,
    avancado:      `<strong>${lead.nome}</strong>, com base nas suas respostas você já está no nível <strong>AVANÇADO</strong> em Libras. 💜\n\nVocê já tem uma boa base e consegue se comunicar. O próximo passo é desenvolver fluência visual, naturalidade e segurança profissional.`,
  };

  await addBubble(explicacoes[nivel], 2000);
  await sleep(600);

  // 3. Pergunta de engajamento
  await addBubble('Quer ir para o próximo nível? 🚀', 700);
  await sleep(300);

  const wrap = document.createElement('div');
  wrap.className = 'choices-wrap show';
  wrap.id = 'choices-proximo-nivel';
  wrap.innerHTML = `
    <button class="choice-btn" onclick="querProximoNivel(true, '${nivel}')">
      <div class="choice-icon">✅</div>
      <div><div class="choice-label">Sim, quero saber como a Lorena pode me ajudar</div></div>
    </button>
    <button class="choice-btn" style="opacity:.65" onclick="querProximoNivel(false, '${nivel}')">
      <div class="choice-icon">👋</div>
      <div><div class="choice-label">Não, obrigado</div></div>
    </button>`;
  addElement(wrap);
}

function mostrarCertificado(nivel) {
  const conf = {
    basico:        { bg: 'rgba(34,197,94,.07)',    borda: 'rgba(34,197,94,.35)',    cor: '#4ADE80', emoji: '🌱', label: 'BÁSICO'        },
    intermediario: { bg: 'rgba(201,150,58,.07)',   borda: 'rgba(201,150,58,.35)',   cor: '#E8B96A', emoji: '✨', label: 'INTERMEDIÁRIO' },
    avancado:      { bg: 'rgba(124,58,237,.10)',   borda: 'rgba(124,58,237,.35)',   cor: '#C4B5FD', emoji: '💜', label: 'AVANÇADO'      },
  };
  const c = conf[nivel];
  const certWrap = document.createElement('div');
  certWrap.className = 'cert-wrap show';
  certWrap.innerHTML = `
    <div class="cert-card" style="background:${c.bg};border:1px solid ${c.borda}">
      <div class="cert-logo">🤟 Nerds da Libras</div>
      <div class="cert-title">Diagnóstico de Nível em Libras</div>
      <div class="cert-nome">${lead.nome}</div>
      <div class="cert-nivel" style="color:${c.cor};background:${c.bg};border:1.5px solid ${c.borda}">${c.emoji} ${c.label}</div>
      <div class="cert-sub">Avaliado pela Prof. Lorena · Nerds da Libras</div>
    </div>`;
  addElement(certWrap);
}

async function querProximoNivel(sim, nivel) {
  document.querySelectorAll('#choices-proximo-nivel .choice-btn').forEach(b => b.disabled = true);

  if (!sim) {
    addUserBubble('Não, obrigado 👋');
    await sleep(400);
    await addBubble(`Foi um prazer te conhecer, <strong>${lead.nome}</strong>! 😊\n\nObrigada por participar da avaliação. Quando quiser evoluir na Libras, a Lorena estará aqui. Nos vemos em breve! 🤟`);
    lead.quisAvancar  = 'Não';
    lead.statusCloser = 'Não quis avançar';
    salvarPlanilha();
    return;
  }

  lead.quisAvancar = 'Sim';
  addUserBubble('Sim, quero saber como a Lorena pode me ajudar ✅');
  await sleep(500);

  const isCurso    = nivel !== 'avancado';
  const linkGrupo  = isCurso ? WA_CURSO : WA_MENTORIA;

  const transicoes = {
    basico:        `Ótimo! O <strong>Curso Do Zero à Libras</strong> da Lorena é o caminho certo para você construir uma base sólida e real em Libras — saindo dos sinais soltos para uma comunicação verdadeira. 🌱➡️✨`,
    intermediario: `Ótimo! O <strong>Curso Do Zero à Libras</strong> da Lorena não é um curso básico — ele vai te ajudar a <strong>consolidar o que você já sabe do jeito certo</strong>, preencher as lacunas da sua base e te preparar para o próximo nível, inclusive se você quiser seguir carreira. ✨🎯`,
    avancado:      `Ótimo! Para você conquistar a <strong>fluência profissional</strong> em Libras, o caminho ideal é a <strong>Mentoria Master Fluência</strong> da Lorena. 💜🚀`,
  };

  await addBubble(transicoes[nivel], 1200);
  await sleep(400);

  mostrarCard(nivel, linkGrupo);

  lead.statusCloser = 'Viu o card';
  salvarPlanilha();

  await sleep(30000);
  if (!lead.clicouGrupo) {
    lead.statusCloser = 'Chamar no WhatsApp';
    salvarPlanilha();
  }
}

function mostrarCard(nivel, linkGrupo) {
  const isCurso = nivel !== 'avancado';

  const extraCurso = `
    <div class="vagas-row"><div class="vagas-dot"></div><span>Vagas limitadas por turma · <strong>abertura anunciada no grupo</strong></span></div>
    <div class="bonus-row">🔔 <strong>Quem está no grupo sabe primeiro</strong> quando a turma abre e recebe condições exclusivas.</div>`;

  const extraMentoria = `
    <div class="vagas-row"><div class="vagas-dot"></div><span>Apenas <strong>15 vagas</strong> por turma · <strong>abertura anunciada no grupo</strong></span></div>
    <div class="bonus-row">🔔 <strong>Quem está no grupo sabe primeiro</strong> quando a turma abre e recebe condições exclusivas.</div>`;

  const pillLabel  = nivel === 'basico' ? '🌱 Base sólida em Libras' : nivel === 'intermediario' ? '✨ Consolide e avance em Libras' : '💜🚀 Fluência Profissional';
  const nivelBadge = isCurso ? (nivel === 'basico' ? 'nivel-verde' : 'nivel-ouro') : 'nivel-roxo';
  const btnClass   = isCurso ? 'btn-rv' : 'btn-rp';
  const pillClass  = isCurso ? 'pill-verde' : 'pill-roxo';

  const resultWrap = document.createElement('div');
  resultWrap.className = 'result-wrap show';
  resultWrap.innerHTML = `
    <div class="result-card ${isCurso ? '' : 'mentoria-card'}">
      <div class="result-photo">
        <img src="${isCurso ? 'fotos/IMG_4977.jpg' : 'fotos/image-1777403006556.jpg'}" alt="Prof. Lorena" onerror="this.src='fotos/IMG_4952.jpg'"/>
        <div class="result-photo-overlay"></div>
        <div class="result-pill-top ${pillClass}">${pillLabel}</div>
      </div>
      <div class="result-body">
        <div class="result-nivel ${nivelBadge}">${nivel === 'basico' ? 'Construa sua base em Libras' : isCurso ? 'Consolide e avance em Libras' : 'Objetivo: Fluência Profissional'}</div>
        <div class="result-titulo">${isCurso ? 'Do Zero à Libras — Base e Intermediário' : 'Mentoria Master Fluência by Lorena'}</div>
        <div class="result-desc">
          ${isCurso
            ? nivel === 'basico'
              ? `Criado para quem quer <strong>sair dos sinais soltos e começar a se comunicar de verdade.</strong> Você vai construir base, vocabulário ativo, estrutura de frases e segurança para conversar com surdos — do jeito certo, com método.`
              : `O Curso Do Zero à Libras <strong>não é apenas para iniciantes.</strong> Ele vai te ajudar a consolidar o que você já sabe de forma estruturada, preencher as lacunas da sua base e te preparar para evoluir — inclusive se você quiser seguir carreira em Libras.`
            : `Acompanhamento <strong>100% personalizado</strong> com a Lorena. Ela identifica onde sua sinalização está travando e te direciona passo a passo em <strong>estrutura visual, fluência, naturalidade e segurança.</strong>`}
        </div>
        ${isCurso ? extraCurso : extraMentoria}
        <a class="btn-result ${btnClass}" href="${linkGrupo}" target="_blank" rel="noopener" onclick="registrarClique()">
          💬 Entrar no grupo e saber quando abre
        </a>
      </div>
    </div>`;
  addElement(resultWrap);
  scrollDown();
}

function registrarClique() {
  lead.clicouGrupo = true;
  lead.entranúGrupo = true;
  lead.statusCloser = 'Acompanhar no grupo';
  salvarPlanilha();
}

function salvarPlanilha() {
  if (!SHEETS_URL) return;
  fetch(SHEETS_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ ...lead }),
  }).catch(() => {});
}

// Garante salvamento mesmo se o lead fechar a página
window.addEventListener('beforeunload', () => {
  if (!SHEETS_URL || !lead.nome) return;
  navigator.sendBeacon(SHEETS_URL, JSON.stringify({ ...lead }));
});

window.addEventListener('DOMContentLoaded', startFlow);
