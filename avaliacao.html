const chatBody   = document.getElementById('chat-body');
const typingWrap = document.getElementById('typing-wrap');
const anchor     = document.getElementById('scroll-anchor');

function hora() {
  const d = new Date();
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}

function scrollDown() {
  anchor.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

function showTyping() { typingWrap.classList.add('show'); scrollDown(); }
function hideTyping() { typingWrap.classList.remove('show'); }

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function addBubble(html, delay) {
  showTyping();
  const d = delay ?? Math.min(900 + html.replace(/<[^>]+>/g, '').length * 22, 3500);
  await sleep(d);
  hideTyping();
  const wrap = document.createElement('div');
  wrap.className = 'bubble-wrap';
  wrap.innerHTML = `
    <div class="bubble-avatar"><img src="fotos/IMG_4952.jpg" alt="Lorena"/></div>
    <div class="bubble">${html.replace(/\n/g,'<br/>')}<div class="bubble-time">${hora()}</div></div>`;
  chatBody.insertBefore(wrap, typingWrap);
  scrollDown();
  await sleep(150);
}

function addUserBubble(text) {
  const wrap = document.createElement('div');
  wrap.className = 'user-bubble-wrap';
  wrap.innerHTML = `
    <div class="user-bubble">${text}
      <div class="user-bubble-time">${hora()} <span style="color:var(--verde)">✓✓</span></div>
    </div>`;
  chatBody.insertBefore(wrap, typingWrap);
  scrollDown();
}

function addElement(el) {
  chatBody.insertBefore(el, typingWrap);
  scrollDown();
}

function iniciarQuiz() {
  lead.iniciouQuiz = true;
  salvarPlanilha();
  quizStep = 0;
  quizScore = 0;
  q1Score = null;
  renderPergunta();
}

function renderPergunta() {
  optSelected = null;
  const q = QUESTIONS[quizStep];
  const n = quizStep + 1;
  const pct = Math.round((n / 12) * 100);

  const wrap = document.createElement('div');
  wrap.className = 'quiz-wrap show';
  wrap.innerHTML = `
    <div class="quiz-progress">
      <span>${n} / 12</span>
      <div class="quiz-bar-track"><div class="quiz-bar-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="quiz-question">${q.text}</div>
    <div id="quiz-opts">
      ${q.opts.map((op, i) => `
        <button class="quiz-opt" onclick="selecionarOpt(${i})" id="opt-${i}">
          <span class="opt-letter">${op.l}</span>
          <span>${op.t}</span>
        </button>`).join('')}
    </div>
    <button class="btn-proximo" id="btn-prox" onclick="proximaPergunta()" disabled>
      ${quizStep < 11 ? 'Próxima →' : 'Ver meu resultado →'}
    </button>`;
  currentQuizWrap = wrap;
  addElement(wrap);
}

function selecionarOpt(idx) {
  optSelected = idx;
  currentQuizWrap.querySelectorAll('.quiz-opt').forEach((b, i) => {
    b.classList.toggle('selected', i === idx);
  });
  const btn = currentQuizWrap.querySelector('.btn-proximo');
  if (btn) btn.disabled = false;
}

async function proximaPergunta() {
  if (optSelected === null) return;
  const q = QUESTIONS[quizStep];
  const pts = q.opts[optSelected].p;

  if (quizStep === 0) q1Score = pts;
  quizScore += pts;

  const textoEscolhido = q.opts[optSelected].t;
  currentQuizWrap.style.opacity = '.3';
  currentQuizWrap.style.pointerEvents = 'none';
  addUserBubble(textoEscolhido.replace(/"/g, ''));
  await sleep(400);

  if (quizStep < 11) {
    quizStep++;
    renderPergunta();
  } else {
    await finalizarQuiz();
  }
}

  await addBubble('Enquanto isso, <strong>pode minimizar esse app e fazer outras coisas</strong> normalmente. Quando a Lorena responder, eu te notifico aqui. 🔔', 2000);

async function ativarNotificacao() {
  document.getElementById('notif-choices')?.remove();
  const perm = await Notification.requestPermission();
  if (perm === 'granted') {
    addUserBubble('Notificação ativada 🔔');
    await sleep(300);
    await addBubble('Perfeito! Pode ir fazer outras coisas. Assim que a Lorena terminar, apareço aqui para você. 😊', 900);
    await agendarNotificacaoSW(TEMPO_ESPERA_S * 1000);
  } else {
    addUserBubble('Vou aguardar aqui');
    await sleep(300);
    await addBubble('Tudo bem! O resultado aparece aqui nessa tela quando ficar pronto. 😊', 800);
  }
  iniciarContagem();
}

async function pularNotificacao() {
  document.getElementById('notif-choices')?.remove();
  addUserBubble('Vou aguardar aqui');
  await sleep(300);
  await addBubble('Tudo bem! O resultado aparece aqui nessa tela quando ficar pronto. 😊', 800);
  iniciarContagem();
}

async function agendarNotificacaoSW(delayMs) {
  if (!('serviceWorker' in navigator)) return;
  try {
    const reg = await navigator.serviceWorker.register('/sw.js');
    await navigator.serviceWorker.ready;
    const sw = reg.active || reg.waiting || reg.installing;
    if (sw) {
      sw.postMessage({ type: 'AGENDAR_RESULTADO', delay: delayMs, nome: lead.nome });
    }
  } catch (e) {}
}

function iniciarContagem() {
  const aguardandoWrap = document.createElement('div');
  aguardandoWrap.className = 'aguardando-wrap';
  aguardandoWrap.innerHTML = `
    <div class="aguardando-bubble">
      <div class="agu-title"><div class="agu-spinner"></div> Lorena está analisando suas respostas...</div>
      <div class="agu-countdown" id="agu-timer">05:00</div>
      <div class="agu-sub">Pode minimizar o app — te aviso quando o resultado chegar 🔔</div>
      <div class="agu-bar-track"><div class="agu-bar-fill" id="agu-fill" style="width:100%"></div></div>
    </div>`;
  addElement(aguardandoWrap);
  scrollDown();

  contarRegressiva(TEMPO_ESPERA_S, aguardandoWrap).then(async () => {
    aguardandoWrap.style.display = 'none';
    dispararNotificacaoLocal();
    await mostrarResultado();
  });
}

function contarRegressiva(totalSeg, wrapEl) {
  return new Promise(resolve => {
    let restante = totalSeg;
    const timerEl = document.getElementById('agu-timer');
    const fillEl  = document.getElementById('agu-fill');
    const tick = () => {
      restante--;
      const m = String(Math.floor(restante / 60)).padStart(2, '0');
      const s = String(restante % 60).padStart(2, '0');
      if (timerEl) timerEl.textContent = `${m}:${s}`;
      if (fillEl)  fillEl.style.width  = `${(restante / totalSeg) * 100}%`;
      if (restante <= 0) resolve();
      else setTimeout(tick, 1000);
    };
    setTimeout(tick, 1000);
  });
}

function dispararNotificacaoLocal() {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  try {
    new Notification('🤟 A Lorena respondeu!', {
      body: `${lead.nome ? lead.nome + ', o' : 'O'} seu resultado está pronto. Toque para ver.`,
      icon: '/fotos/IMG_4952.jpg',
      tag: 'resultado-lorena',
    });
  } catch (e) {}
}

function calcularNivel() {
  if (q1Score <= 1) return 'curso';
  if (quizScore <= 30) return 'curso';
  return 'mentoria';
}

async function mostrarResultado() {
  const nivel = calcularNivel();

  const isCurso = nivel === 'curso';

  const msgResultado = isCurso
    ? `A Lorena analisou suas respostas com atenção e me passou seu resultado, <strong>${lead.nome}</strong>. 🙂\n\nPelo que você respondeu, fica claro que você ainda está <strong>construindo sua base em Libras</strong> — e isso é completamente normal.\n\nO desafio de quem está nessa fase não é falta de vontade. É que sem uma base sólida, você pode memorizar sinais e continuar travando na hora de conversar, porque falta estrutura, vocabulário ativo e segurança para montar frases de verdade.\n\nO caminho mais indicado para você agora é o <strong>Curso Do Zero à Libras.</strong>`
    : `A Lorena analisou suas respostas com atenção e me passou seu resultado, <strong>${lead.nome}</strong>. 🙂\n\nVocê já tem uma base em Libras — isso é muito bom. Mas pelo que você respondeu, o seu desafio agora não é mais aprender sinais novos.\n\nO que está travando você é outra coisa: <strong>estrutura visual, organização do pensamento antes de sinalizar, processo tradutório, fluência, clareza e naturalidade.</strong>\n\nEsses elementos não se desenvolvem sozinhos com mais estudo em grupo. Eles precisam de direcionamento personalizado.\n\nO caminho mais indicado para você é a <strong>Mentoria Master Fluência by Lorena.</strong>`;

  lead.nivel  = isCurso ? 'Curso da Lorena' : 'Mentoria Master Fluência';
  lead.oferta = isCurso ? 'Curso' : 'Mentoria';

  await addBubble(msgResultado, 3000);
  await sleep(600);

  // Card
  const linkGrupo = isCurso ? WA_CURSO : WA_MENTORIA;

  const extraCurso = `
    <div class="vagas-row"><div class="vagas-dot"></div><span>Oferta por tempo limitado · <strong>bônus exclusivos</strong> para membros do grupo</span></div>`;

  const extraMentoria = `
    <div class="vagas-row"><div class="vagas-dot"></div><span>Apenas <strong>15 vagas</strong> por turma — acompanhamento personalizado</span></div>
    <div class="bonus-row">🎁 <strong>Bônus exclusivo para quem estiver no grupo</strong> — pensado para você recuperar o investimento rapidinho.</div>`;

  const resultWrap = document.createElement('div');
  resultWrap.className = 'result-wrap show';
  resultWrap.innerHTML = `
    <div class="result-card ${isCurso ? '' : 'mentoria-card'}">
      <div class="result-photo">
        <img src="${isCurso ? 'fotos/IMG_4977.jpg' : 'fotos/image-1777403006556.jpg'}" alt="Prof. Lorena" onerror="this.src='fotos/IMG_4952.jpg'"/>
        <div class="result-photo-overlay"></div>
        <div class="result-pill-top ${isCurso ? 'pill-verde' : 'pill-roxo'}">${isCurso ? '🌱 Curso da Lorena' : '💜 Mentoria da Lorena'}</div>
      </div>
      <div class="result-body">
        <div class="result-nivel ${isCurso ? 'nivel-verde' : 'nivel-roxo'}">${isCurso ? 'Indicado para você' : 'Pronta para Mentoria'}</div>
        <div class="result-titulo">${isCurso ? 'Do Zero à Libras — Base e Intermediário' : 'Mentoria Master Fluência by Lorena'}</div>
        <div class="result-desc">
          ${isCurso
            ? `Desenvolvido para quem quer <strong>sair dos sinais soltos e passar a se comunicar de verdade.</strong> Você vai construir base, vocabulário ativo, estrutura de frases e segurança para conversar com surdos.<br/><br/>Ideal para iniciantes e intermediários que querem aprender do jeito certo, com método.`
            : `Acompanhamento <strong>100% personalizado</strong> com a Lorena. Ela analisa sua sinalização, identifica o que está travando e te direciona passo a passo para evoluir em <strong>estrutura visual, fluência, naturalidade e clareza.</strong><br/><br/>Para quem já tem base e quer chegar a um nível profissional ou de alta comunicação.`}
        </div>
        <div class="preco-row">
          💰 Valor normal: <span class="preco-riscado">${isCurso ? 'R$&nbsp;999,00' : 'R$&nbsp;3.999,00'}</span>
          &nbsp;→&nbsp;<span class="preco-oferta">Oferta especial liberada dentro do grupo</span>
        </div>
        ${isCurso ? extraCurso : extraMentoria}
        <a class="btn-result ${isCurso ? 'btn-rv' : 'btn-rp'}" href="${linkGrupo}" target="_blank" rel="noopener"
          onclick="registrarClique('${linkGrupo}')">
          💬 Entrar no grupo e receber a oferta
        </a>
      </div>
    </div>`;
  addElement(resultWrap);

  lead.resultadoEnviado = true;
  lead.statusCloser = 'Aguardando entrada no grupo';
  salvarPlanilha();

  // Atualiza status na planilha após 30s se não clicou
  await sleep(30000);
  if (!lead.clicouGrupo) {
    lead.statusCloser = 'Chamar no WhatsApp';
    salvarPlanilha();
  }
}

function registrarClique(link) {
  lead.clicouGrupo = true;
  lead.entranúGrupo = true;
  lead.statusCloser = 'Acompanhar no grupo';
  salvarPlanilha();
}

function salvarPlanilha() {
  if (!SHEETS_URL) return;
  fetch(SHEETS_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ ...lead }),
  }).catch(() => {});
}

// Garante salvamento mesmo se o lead fechar a página
window.addEventListener('beforeunload', () => {
  if (!SHEETS_URL || !lead.nome) return;
  navigator.sendBeacon(SHEETS_URL, JSON.stringify({ ...lead }));
});
