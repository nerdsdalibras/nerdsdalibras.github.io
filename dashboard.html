<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CRM · Nerds da Libras</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="dashboard.css"/>
</head>
<body>

<!-- ── SENHA ── -->
<div id="password-screen">
  <div class="pwd-card">
    <div class="pwd-icon">🤟</div>
    <h1 class="pwd-title">Nerds da Libras</h1>
    <p class="pwd-sub">Painel de Leads · Acesso restrito</p>
    <input id="pwd-input" class="pwd-input" type="password" placeholder="Senha"
      onkeydown="if(event.key==='Enter')checkPassword()"/>
    <button class="pwd-btn" onclick="checkPassword()">Entrar</button>
    <p class="pwd-err" id="pwd-err"></p>
  </div>
</div>

<!-- ── APP ── -->
<div id="app" hidden>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <span class="logo-icon">🤟</span>
      <div>
        <div class="logo-name">Nerds da Libras</div>
        <div class="logo-sub">CRM · Lorena</div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <button class="nav-item active" onclick="setPage('leads')" data-page="leads">
        <span class="nav-icon">◈</span>
        <span class="nav-label">Leads</span>
        <span class="nav-badge" id="badge-leads"></span>
      </button>
      <button class="nav-item" onclick="setPage('pipeline')" data-page="pipeline">
        <span class="nav-icon">⬡</span>
        <span class="nav-label">Pipeline</span>
      </button>
      <button class="nav-item" onclick="setPage('analytics')" data-page="analytics">
        <span class="nav-icon">◎</span>
        <span class="nav-label">Analytics</span>
      </button>
    </nav>

    <div class="sidebar-footer">
      <button class="logout-btn" onclick="logout()">→ Sair</button>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">

    <!-- TOPBAR -->
    <header class="topbar">
      <button class="menu-btn" onclick="toggleSidebar()">☰</button>
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input class="search-input" id="search-input" type="text"
          placeholder="Buscar por nome, WhatsApp..."
          oninput="onSearch()"/>
      </div>
      <div class="topbar-right">
        <button class="icon-btn" onclick="renderDashboard()" title="Atualizar">↺</button>
        <button class="icon-btn" onclick="exportCSV()" title="Exportar CSV">↓</button>
      </div>
    </header>

    <!-- PAGES -->
    <div class="content">

      <!-- LEADS -->
      <div id="page-leads" class="page active">
        <div class="ai-box" id="ai-box" style="display:none"></div>
        <div class="stats-grid" id="stats"></div>
        <div class="filters-bar" id="filters"></div>
        <div id="leads-list"></div>
      </div>

      <!-- PIPELINE -->
      <div id="page-pipeline" class="page">
        <div class="page-header">
          <h2 class="page-title">Pipeline de Vendas</h2>
        </div>
        <div class="kanban" id="kanban"></div>
      </div>

      <!-- ANALYTICS -->
      <div id="page-analytics" class="page">
        <div class="page-header">
          <h2 class="page-title">Analytics</h2>
        </div>
        <div class="analytics-grid" id="analytics-grid"></div>
      </div>

    </div>
  </div>

  <!-- OVERLAY -->
  <div class="panel-overlay" id="panel-overlay" onclick="closePainel()"></div>

  <!-- LEAD PANEL -->
  <aside class="lead-panel" id="lead-panel">
    <div class="panel-topbar">
      <button class="panel-close" onclick="closePainel()">✕</button>
      <div class="panel-title-wrap" id="panel-title-wrap"></div>
      <div class="panel-hdr-actions" id="panel-hdr-actions"></div>
    </div>
    <div class="panel-tabs" id="panel-tabs">
      <button class="tab active" onclick="setTab('dados')"     data-tab="dados">Dados</button>
      <button class="tab"        onclick="setTab('timeline')"  data-tab="timeline">Timeline</button>
      <button class="tab"        onclick="setTab('objections')"data-tab="objections">Objeções</button>
      <button class="tab"        onclick="setTab('agenda')"    data-tab="agenda">Agenda</button>
      <button class="tab"        onclick="setTab('ia')"        data-tab="ia">IA</button>
    </div>
    <div class="panel-body" id="panel-body"></div>
  </aside>

</div>

<script src="config.js"></script>
<script src="storage.js"></script>
<script src="decisionEngine.js"></script>
<script src="dashboard.js"></script>
</body>
</html>
